/* ================= 薪资调整（40岁分水岭） ================= */
async function salaryCell(p){
  if(p.retired){ await info('💼 薪资调整','您已退休，与职场的涨落无关了。愿岁月静好。'); return; }
  if(p.unemployed>0){ await info('💼 薪资调整','失业中，没有薪资可调。先找到工作再说。'); return; }
  let ch=0, msg;
  if(p.age<40){
    const r = await rollDice(p,1,'薪资调整（40岁前）','<div class="rule">1-2点：年薪-10%；3-4点：不变；5点：+10%；6点：+20%。<br>如今的行情，涨薪从来不是大概率事件。</div>');
    if(r.sum<=2){ ch=-0.1; msg='行业不景气，年薪下调10%。'; }
    else if(r.sum<=4){ msg='薪资原地踏步。'; }
    else if(r.sum===5){ ch=0.1; msg='表现出色，加薪10%！'; }
    else if(p.gender==='f'){ ch=0.15; msg='你拿下了大项目，加薪15%——隔壁做同样事情的男同事拿了20%。你决定下次谈薪时更硬气一点。'; }
    else { ch=0.2; msg='难得的机会，加薪20%！'; }
  } else {
    const r = await rollDice(p,1,'薪资调整（40岁后）','<div class="rule">1点：年薪-20%（被「优化」了岗级）；2-3点：-10%；4-6点：不变。<br>40岁之后，职场的天花板变成了地板。</div>');
    if(r.sum===1){ ch=-0.2; msg='40岁后的职场寒意：岗级被优化，年薪-20%。'; }
    else if(r.sum<=3){ ch=-0.1; msg='部门调整，年薪缩水10%。'; }
    else { msg='还好，这一年薪资保住了。'; }
  }
  if(ch) p.salary*=(1+ch);
  await info('💼 薪资调整', `${msg}<br>当前年薪：<b>${fmt(p.salary*p.salaryF)}</b><div class="tip">工资是大多数家庭最重要的现金流——但它有周期、有年龄，不会永远向上。这正是要尽早建立<b>资产性收入</b>的原因。</div>`);
  log(p, msg + `年薪现为${fmt(p.salary*p.salaryF)}。`, ch!==0, '💼');
  renderAll();
}
async function regretCell(p){
  if(p.regret==='none'){
    p.regret='have';
    await info('💊 千金难买后悔药','你获得了一颗<b>后悔药</b>！整个游戏中仅此一颗：未来任何一次掷骰后，可以用它重掷一次，改写命运。<div class="tip">现实中没有后悔药——所以重要的决定，请在做之前多想一步。</div>');
    log(p,'获得了千金难买的后悔药。',true,'💊');
  } else {
    await info('💊 后悔药','药铺老板摊摊手：一人一生只有一颗，你已经拿过了。');
  }
  renderAll();
}
/* ================= 回合流程 ================= */
async function landEffect(p){
  const t = CELLS[p.pos];
  if(t==='stock') await stockOffice(p);
  else if(t==='exp') await drawExpense(p);
  else if(t==='house') await propertyOffice(p,'house');
  else if(t==='shop') await propertyOffice(p,'shop');
  else if(t==='pe') await peOffice(p);
  else if(t==='biz') await bizOffice(p);
  else if(t==='news') await drawNews(p);
  else if(t==='sal') await salaryCell(p);
  else if(t==='regret') await regretCell(p);
}
function crossed(from, steps, target){
  for(let s=1;s<=steps;s++) if((from+s)%36===target) return true;
  return false;
}
async function takeTurn(){
  if(G.over) return;
  const p = G.players[G.turn];
  p.turnCount++;
  const canTwo = !p.oneDie && p.stamina>0;
  renderAll();
  renderCenter(canTwo
    ? `掷2粒=拼命模式：走得快、双4/双5可能被赏识加薪，但双6积劳成疾、双1易出意外。拼劲还剩 ${p.stamina} 次。`
    : (p.oneDie ? '大病初愈，体力有限：只能掷1粒骰子。' : '年轻时的拼劲已经用完，从此只能掷1粒骰子——身体是有额度的。'));
  $('#cDice').innerHTML = dieHTML(6,false);
  const btns = $('#cBtns'); btns.innerHTML='';
  const choose = await new Promise(res=>{
    const b1=document.createElement('button'); b1.className='btn-plain btn-sm'; b1.textContent='掷1粒🎲';
    const b2=document.createElement('button'); b2.className='btn-main btn-sm'; b2.textContent=`掷2粒🎲🎲(${p.stamina})`;
    b1.onclick=()=>res(1); b2.onclick=()=>res(2);
    btns.appendChild(b1);
    if(canTwo) btns.appendChild(b2);
  });
  btns.innerHTML='';
  if(choose===2){ p.stamina--; p.diceTwoCount++; }
  const d1=die(), d2= choose===2?die():0;
  const steps = d1+d2;
  await animateDice($('#cDice'), choose===2?[d1,d2]:[d1], false);
  renderCenter(`掷出 ${steps} 点`);
  const overwork = (choose===2 && d1===6 && d2===6);
  const mishap   = (choose===2 && d1===1 && d2===1);
  const hustle   = (choose===2 && d1===d2 && (d1===4||d1===5));

  const from = p.pos;
  const glowc = TOKEN_COLORS[p.idx];
  for(let s=1;s<=steps;s++){
    p.pos = (from+s)%36; renderTokens();
    document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('active-cell'); c.style.removeProperty('--glowc');});
    const cell = $('#cell'+p.pos);
    cell.style.setProperty('--glowc', glowc);
    cell.classList.add('active-cell');
    await sleep(140);
  }
  if(crossed(from, steps, BANK_I)){ await bankSettlement(p); if(p.out || p.done || G.over) return endTurn(); }
  if(!p.out && crossed(from, steps, INS_I)){
    const go = await modal({title:'🛡️ 路过保险公司', klass:'k-teal', html:'<div class="desc">要进去看看保险产品吗？（投保/退保/储蓄险）</div>',
      buttons:[{label:'直接路过',value:false,cls:'btn-plain'},{label:'进去看看',value:true,cls:'btn-gold'}]});
    if(go) await insuranceOffice(p);
  }
  if(!p.out && !(p.pos===BANK_I) && !(p.pos===INS_I)) await landEffect(p);
  if(!p.out && overwork && !p.illness) await criticalIllness(p, true);
  else if(!p.out && mishap) { await info('⚡ 拼过头了','连轴转的日子，骑车赶路时出了岔子……','','⚡','掷骰看伤情'); await accidentEvent(p); }
  else if(!p.out && hustle){
    if(p.retired || p.unemployed>0){ /* 无主业时不触发 */ }
    else if(p.age<40){
      p.salary*=1.05; p.flags.hustleRaise=(p.flags.hustleRaise||0)+1;
      await info('🌟 拼命被看见了',`双${d1}！连续的加班和漂亮的项目让领导记住了你，年薪上调 <b class="pos">5%</b>（现为 ${fmt(p.salary*p.salaryF)}）。<div class="tip">拼命有时真的有回报——但请翻回去看看双6和双1的那两行。</div>`);
      log(p,'拼命工作被赏识，年薪+5%。',true,'🌟');
    } else {
      p.cash+=3; p.flags.hustleRaise=(p.flags.hustleRaise||0)+1;
      await info('🌟 老将的价值',`双${d1}！40岁后涨薪无望，但你扛下了没人敢接的项目，拿到一次性奖金 <b class="pos">+3万</b>。`);
      log(p,'扛下硬仗，获得奖金3万。','', '🌟');
    }
  }
  endTurn();
}
function endTurn(){
  if(G.over) return;
  const alive = G.players.filter(x=>!x.out && !x.done);
  if(!alive.length){ renderAll(); showSummary(); return; }
  do { G.turn = (G.turn+1)%G.players.length; } while(G.players[G.turn].out || G.players[G.turn].done);
  renderAll();   /* 先换人再渲染：呼吸闪烁立刻落在即将掷骰子的玩家身上 */
  if(document.hidden) Promise.resolve().then(takeTurn);
  else setTimeout(takeTurn, 400);
}

/* ================= 终局：一封信（评述式） ================= */
function buildLetter(p){
  const g = goals(p);
  const nw = p.estateValue!==null?p.estateValue:netWorth(p);
  const yrs = p.age-35;

  /* —— 身故的信单独写 —— */
  if(p.dead){
    return `这是一封没能寄出的信。\n\n${p.name}的人生停在了${p.age}岁。整理遗物时，家人翻出了这些年的账本${p.lifeIns?'，和一张定期寿险保单':''}。\n\n${p.lifeIns?
      '那份100万的保单，是TA留给家人最后的拥抱。房贷还得上，孩子的书读得起，日子虽然缺了一角，但还能继续。TA生前最正确的决定，也许不是哪一笔投资，而是在30多岁、保费还便宜的时候，安静地签下了那份没人鼓掌的合同。':
      '没有保单，没有安排。TA不是不爱家人，只是总觉得「以后再说」。可意外从不等人把「以后」过完。爱如果没有安排，最后只剩遗憾。'}\n\n谨以此局，敬每一个提前把爱安排好的人。`;
  }

  /* —— 评述段落池：只挑与这一程真实相关的；同一件事多种写法，随机取一 —— */
  const P=[];
  const add=(pri,txt)=>P.push({pri,txt});
  const pick=(...a)=>a[Math.floor(Math.random()*a.length)];

  /* 拼命与身体 */
  if(p.flags.overworkIll) add(1,`说说那些掷两粒骰子的年头吧。你几乎每一回都选择拼命模式，项目一个接一个，凌晨的办公楼你比保安还熟。拼搏本身没有错——错的是不设上限。诊断书递过来的那天你才明白：用健康换来的钱，大多都要还给医院。`);
  else if(p.flags.illness) add(1,`那场大病来得没有道理，谁也没做错什么。${p.flags.critClaim?'但你提前买好的重疾险在最黑暗的时刻点了灯——你可以专心治病，不必一边输液一边算账。这是你这一程下得最好的一手棋。':'而你手里没有一张保单可以依靠，账单和病痛一起压了下来。如果时间能倒回，你一定会在健康的时候，把保障先安排好。'}`);
  else if(p.diceTwoCount>=Math.max(6,p.turnCount*0.6)) add(3,`你这一程拼得很凶——${p.diceTwoCount}次选择了两粒骰子的拼命模式，而双六始终没有找上你。恭喜，也提醒：你赢的是骰子，不是规律。现实里没人能保证自己永远掷不出那两个六。`);
  if(p.stamina<=0 && !p.illness) add(4,`拼劲的额度终究是用完了。后来你只能掷一粒骰子，走得慢，却也稳。人到中年才读懂：体力，原来也是资产负债表上的一项，而且不可再生。`);

  /* 保障（未病未保 / 火灾 / 孩子） */
  if(!p.flags.illness && !p.flags.boughtCrit && !p.flags.died) add(5,pick(
    `这一程你没有买过重疾险，也侥幸没有生大病。请诚实地把这算作运气，而不是策略——骰子只是恰好没停在那一面。`,
    `健康这一栏，你是裸奔着跑完全程的：没保单，也没出事。为你松一口气之余提醒一句：概率不会因为上一局没中，下一局就绕开你。`,
    `你没给自己买过一份重疾保障，命运也恰好手下留情。这不是策略赢了，是骰子仁慈——而骰子的仁慈，从来不签合同。`));
  if(p.flags.fireInsured) add(6,`那场大火值得记一笔：千分之一的保费，在火光里保住了整套房子。「出事了也没事」，这就是风险管理的最高境界，你做到了。`);
  if(p.flags.fireUninsured) add(2,`那场大火也值得记一笔：你省下了千分之一的保费，火焰便收走了百分之百的房子。小概率乘以大损失，从来不是可以自留的风险。`);
  if(p.flags.kidCritClaim) add(2,`孩子生病的那段日子，是全家最暗的隧道。幸好那份你顺手买下的孩子重疾险，让你可以放下工作握住TA的手，而不是在病房和银行之间奔波。`);
  if(p.flags.kidIllNoIns) add(2,`孩子生病的那段日子，你才发现最便宜、杠杆最高的那张保单——孩子的重疾险——被你「以后再说」了太多次。大人可以硬扛，看着孩子受苦还要算钱，是双倍的煎熬。`);

  /* 投资功过 */
  const baskets=[p.props.length>0,p.blue+p.gem>0||p.flags.stockTrades,p.trust>0||p.flags.trustDelay,p.flags.boughtP2P,p.flags.investedPE,p.flags.ranBiz,p.saveIns.length>0||p.flags.boughtSaveIns].filter(Boolean).length;
  if(p.flags.p2pLost) add(2,pick(
    `P2P爆雷那天早上，你刷新了几十次那个再也打不开的App。${fmt(p.flags.p2pLost)}，买来一句值一生的话：收益率超过8%就要打问号，超过10%，就要做好本金归零的心理准备。`,
    `说说那笔P2P吧。13%的年化像糖，${fmt(p.flags.p2pLost)}的本金是牙。高收益从不骗人，它明明白白写着——只是把「风险」两个字写得小了点。`,
    `那个再也打不开的理财App，教会你一件事：这世上真有无风险的收益，它叫国债，年化不到3%；其余的每一个百分点，都是用风险换的。${fmt(p.flags.p2pLost)}，学费不便宜，但这堂课值。`));
  if(p.flags.cryptoLost) add(4,`还有币圈那一把。晒收益的人从不晒爆仓，你替他们补上了另一半真相。投机和投资的区别，你现在懂了：一个赚资产创造的钱，一个赚下一个接盘者的钱。`);
  if(p.flags.peWin && !p.flags.peLost) add(4,`你投的创业公司真跑出来了，${fmt(p.flags.peWin)}落袋。签退出协议那天记得你请全家吃了大餐——更难得的是，你没把这次运气当成自己的能力。`);
  if(p.flags.peLost && !p.flags.peWin) add(4,`创业股权那${fmt(p.flags.peLost)}打了水漂。九死一生的游戏本就如此——教训不是「别投」，而是：高风险的钱，只能用亏光了也不心疼的部分去投。`);
  if(p.flags.bizFail) add(4,`小店关张的那个傍晚，你在卷帘门前站了很久。个体生意的阵亡率本就残酷，这不丢人。丢人的是很多人连试都没试过——你试过了，也及时止住了。`);
  else if(p.bizUnits>=5) add(5,`那家越开越大的小店是你的骄傲，也是你的透支：凌晨进货、深夜盘账，主业的工资都被它拖累。副业做大之前，先想清楚时间从哪里来——这道题你是用身体答的。`);
  if(baskets>=3 && !p.flags.bankrupt) add(5,pick(
    `值得表扬的是，你没把鸡蛋放在一个篮子里——房产、股票、理财、股权……${baskets}类资产各司其职。分散不能让你暴富，但它让你在每一次风浪里都留在了牌桌上。`,
    `你的账簿翻起来是立体的：${baskets}类资产，有的管现金流，有的管增值，有的管睡个好觉。这叫资产配置——普通人理财的唯一免费午餐。`,
    `这些年你搭了一张有${baskets}条腿的桌子：某一条腿断了，桌子也不会翻。比起押注单一资产的惊险故事，你这种「无聊」，才是理财的最高级形态。`));
  if(baskets===0) add(3,pick(
    `这一程你几乎没碰任何投资。看起来最安全，实际上你把全部身家押在了三件事上：不失业、不生病、通胀温和。楼下煎饼摊都涨价了——不投资，本身就是一种没有对冲的高风险。`,
    `你的账簿干净得让人心疼：没有股票，没有房产，没有股权，只有工资进、开销出。你以为自己没下注，其实你把全部筹码押在了「一切不变」上——而世界唯一不变的就是变。`,
    `一辈子没碰投资，是很多人引以为傲的「稳」。可钱这个东西，不在你手里生息，就在别人的定价里贬值。煎饼摊涨价的每一年，都在悄悄扣你的分。`));

  /* 规划与纪律 */
  if(p.flags.bankrupt) add(0,pick(
    `最想抱一抱的，是宣告破产那天的你。请记住那天真正的教训：击垮你的从来不是资产缩水，而是现金流断裂——手里如果留着六个月的应急钱，很多资产根本不必贱卖。破产是一种财务状态，不是人生判决，你的信用和能力都还在。`,
    `先说最沉的那一页：破产。那天你签完字走出来，天却出奇地蓝。多年以后你会明白，压垮你的不是哪一笔亏损，而是账上没有留够「喘气的钱」。人生可以清零重来，教训不必再交一次学费。`,
    `账簿上最黑的一笔是破产。可我不想只谈遗憾——你敢下注、敢承担，只是忘了给自己留退路。下一程记住四个字：现金为王。不是让你不投资，是让你永远有得选。`));
  else if(p.flags.forcedSale) add(2,`有几个深夜，你不得不打折变卖资产来堵现金的窟窿。八折、九折——那些折扣就是「没有规划」的价格。后来你懂了：理财第一课不是收益率，是永远给生活留一笔碰不得的应急金。`);
  if(p.flags.usedSavings) add(4,`强制储蓄最终被动用了——别难过，这恰恰说明你做对了：专款专用的防线，本来就是为山穷水尽的那一天修的。没有它，故事会难看得多。`);
  else if(p.savings>=30||p.flags.planDone) add(4,pick(
    `那一笔笔「先存后花」的强制储蓄，攒到了${fmt(p.savings)}。没有哪一年存得轰轰烈烈，但纪律的复利比收益的复利更可靠——这是你身上最值钱的习惯。`,
    `你的强制储蓄账户躺着${fmt(p.savings)}。它从没让你兴奋过，也从没让你失望过——理财里最被低估的能力，就是这样年复一年的「无聊」。`,
    `别人晒收益率的时候，你在默默存钱。${fmt(p.savings)}的储蓄没有任何传奇色彩，但每一分都听你的话——这世上跑赢大多数人的方法，其实就是「存下来，别乱动」。`));
  if(p.flags.boughtSaveIns) add(6,`你还给${p.saveIns.some(x=>x.owner==='child')?'孩子':'自己'}锁了几份4.5%的储蓄险。它不性感，跑不赢牛市，但十五年的锁定期锁住的其实是人性——防的不是市场，是自己的手。`);

  /* 职业 */
  if(p.flags.mba) add(5,`三十万的MBA学费当时肉疼，后来的加薪把它慢慢还了回来。四十岁前最好的投资标的是自己，这句话你用行动投了票。`);
  if(p.flags.unemployed) add(3,`失业的那几年是最长的冬天。简历石沉大海，开支照单全收。熬过去之后你逢人就说两个词：应急金，和第二收入曲线。`);
  if(p.flags.hustleRaise) add(6,`当然也有回报的时刻——你的拼命被看见过${p.flags.hustleRaise}次，加薪和奖金都是熬夜换来的军功章。只是别忘了军功章的另一面刻着什么。`);
  if(p.flags.retiredEarly) add(3, g.freedom>=1?`最漂亮的退场是那年的提前退休：被动收入盖过了全部开销，你交还工牌的时候，工作从「必须」变成了「选择」。这就是理财这门课的满分答卷。`:`你提前退了休，虽然那时被动收入还没完全接住生活。勇气可嘉，但自由是有账单的——好在你知道自己在换什么：用一点安全感，换大把的时间。`);

  /* 家庭与幸福 */
  if(p.flags.wedding) add(5,pick(
    `孩子婚礼上你举杯的那一刻，三十万变成了无价。有些支出在账本上是减项，在人生里是加项——你分得清，这很难得。`,
    `婚礼那天你敬酒回来，眼眶红红地说「值了」。账簿不会懂这两个字，但人生懂。会赚钱是本事，敢在对的地方花钱，是智慧。`));
  if(p.flags.simpleWedding) add(4,`孩子的婚礼最终从简了。TA说理解，你也说值得，只是那晚的酒你喝得比平时慢。钱是工具，幸福才是目的——这道题，你欠了一个更好的答案。`);
  if(p.flags.gaveUpStudy) add(3,`最难开口的是那句「咱们换个学校吧」。孩子的留学梦停在了录取通知书上。教育金这种事，等用到才筹就晚了——如果早几年开始存，那晚的饭桌不会那么安静。`);
  else if(p.flags.studyAbroad) add(5,`机场送孩子留学那天，钱包空了一块，心里满了一块。四年八十万，是你早早准备的储蓄接住的——从容，是提前规划给的底气。`);
  if((p.flags.skippedTravel||0)>=2) add(4,pick(
    `你对家人说过${p.flags.skippedTravel}次「下次一定」。账是省下了，但相册里少的那几页，后来花多少钱都补不回来。`,
    `${p.flags.skippedTravel}次全家旅行，都停在了「下次吧」。后来孩子大了，父母老了，「下次」成了这本账簿里最贵的一个词——它从不占用现金，却透支回忆。`));
  if(p.flags.divorced) add(3,`那段婚姻画上句号时，可分割的财产减了半${p.saveIns.some(x=>x.owner==='child')?'，唯独给孩子买的储蓄险完整地留了下来——晴天时搭好的财务架构，在暴雨里显出了价值':''}。爱和钱都需要安排，这一课学费高昂。`);
  if(p.flags.wentFreelance) add(3,`副业超过主业的那一年，你把辞职信轻轻放在了老板桌上——这一次不是赌气，是底气。第二收入曲线长成第一曲线，是这些年你最漂亮的一次「换轨」。`);
  else if(p.flags.sideHustle && p.side && p.side.income>0) add(5,`那份熬了三年才开张的副业，如今一年能带来${fmt(p.side.income)}。前三年用爱发电的日子没有白费——第二收入曲线，是打工人最好的失业保险。`);
  else if(p.flags.sideHustle && (!p.side || !p.side.income)) add(6,`副业折腾了几年，始终没能开花。不过别懊悔——你至少验证了一条路走不通，这也是有价值的信息。`);
  if((p.flags.boughtLow||0)>=3 && G.infl>1.2) add(3,`还有一件温水煮青蛙的事：你把大部分闲钱放在了1.5%的低风险理财里，图个安稳。可这些年物价涨了${Math.round((G.infl-1)*100)}%——账面一分没亏，购买力却瘦了一圈。<b>最安全的选择，往往藏着最隐蔽的风险：通胀。</b>`);
  if(p.flags.rageQuit) add(4,`那次裸辞你一定记得。摔门的瞬间很爽，接下来一年的账单很长。后来你学会了：离开可以，但要「骑驴找马」，让情绪付账单是最贵的消费。`);
  if(p.flags.keepUpJoneses) add(5,`同事那台特斯拉，最终让你也换了车。30万买来三天的兴奋和五年的折旧——攀比是台碎钞机，晒图的人不会替你还贷款。`);
  if(p.flags.rationalCar) add(6,`看到同事晒新车时你也心痒过，但最后你拍了拍自己那台旧车的方向盘：「还能跑。」省下的30万后来在账上默默生息——理性不性感，但值钱。`);
  if(p.flags.loyal) add(5,`还有那杯和白月光的咖啡。你喝完就回了家，把故事留在了咖啡馆。守住的不只是婚姻，还有你半生的资产负债表——离婚才是普通人最大的财务黑天鹅。`);
  if(p.flags.affair) add(3,`那段不敢见光的插曲，虽然没被发现，却在你心里悄悄记了一笔负债——有些账，账本上看不见，夜里睡不着的时候才对账。`);
  if(p.flags.intlSchool && !p.flags.studyAbroad) add(5,`国际学校那每年15万的学费，最终没能换来一张海外录取书。这堂课很贵：教育是买概率，不是买结果——下注之前，先想想能不能承受「没中」。`);
  else if(p.flags.intlSchool) add(6,`国际学校加留学，这条路你陪孩子走完了全程，账单厚得像一本书。值不值，要等TA长大才知道——但至少，这笔钱花在了你最珍视的地方。`);
  if(p.flags.kidStar) add(5,`最欣慰的莫过于孩子的每年那份孝敬——不在钱多少，而在TA真的长成了能托底的人。你在教育上下的注，加上TA自己的运气和努力，都开花了。`);
  if(p.flags.kidNeet) add(4,`孩子毕业后在家的那段日子，你嘴上说「不急」，深夜却翻来覆去。学区房、补习班都买不来offer——教育是概率，不是保险。好在日子还长，孩子的骰子还能再掷。`);
  if(p.flags.luckyGain) add(6,`命运也曾突然对你温柔——拆迁款、旧硬盘、那张彩票……天降的${fmt(p.flags.luckyGain)}。你${p.happiness>3?'没有挥霍它':'接住了它'}，这比中奖本身更难得。`);
  if(p.happiness>=6) add(5,pick(
    `最后想说：${p.happiness}点功德值，比净资产更让我替你高兴。旅行、婚礼、那些「不划算」的小事，你都没省——钱被你用成了工具，而不是目的。`,
    `这本账簿里我最喜欢的数字不是净资产，是那${p.happiness}点功德。它们来自你每一次「不划算」的选择：一顿纪念日晚餐、一场说走就走的旅行、一次伸手相助。钱会贬值，这些不会。`,
    `${p.happiness}点功德，攒得比钱还扎实。你早就想明白了：账簿的最后一栏从来不是余额，是这一生值不值得。`));
  else if(p.happiness<=0) add(4,pick(
    `只是回头看，账户的数字上去了，生活的滋味却淡了。省下的旅行、从简的仪式、搁置的心愿……下一程，记得对自己和家人好一点，那才是攒钱的意义。`,
    `功德栏几乎是空的。你把每一分钱都花在了刀刃上，却忘了生活不是一把刀。存款会说话，但它不会陪你吃饭、旅行、哭和笑——下一局，给「无用之事」留点预算吧。`));

  P.sort((a,b)=>a.pri-b.pri);
  const body = P.slice(0,9).map(x=>x.txt).join('\n\n');

  const pickG=(...a)=>a[Math.floor(Math.random()*a.length)];
  const open = pickG(
    `亲爱的${p.name}：\n\n见字如面。我是${yrs}年后的你，想在这封信里，替岁月给你算一笔总账——不是钱的账，是选择的账。`,
    `亲爱的${p.name}：\n\n翻开这本${yrs}年的账簿，每一页都是钱，但合上它，满纸都是选择。有几件事，想和你聊聊。`,
    `亲爱的${p.name}：\n\n${yrs}年了。账簿会记住每一笔进出，但只有这封信，记得你做每个决定时的表情。`);
  const close = `\n\n如今你${p.age}岁，家底${fmt(nw)}${g.freedom>=1?'，非工资收入已经盖过了全部开销——恭喜你，把人生的选择权买了回来':g.freedom>=0.5?`，财务自由走到了${Math.round(g.freedom*100)}%，雪球已经滚起来了`:'，财务自由还在路上，但每一步都算数'}。\n\n${pickG(
    '人生这张牌桌，骰子我们说了不算，怎么下注却始终在自己手里。',
    '账簿终会合上，日子还长。愿你往后每一笔支出，都花得心安理得；每一笔储蓄，都存得心甘情愿。',
    '记住：理财的终点从来不是发财，是无论骰子怎么掷，你都过得下去、过得体面、过得像自己。')}\n\n——老朱`;
  return open + '\n\n' + body + close;
}

/* ================= 人生称号 & 成就（传播用） ================= */
function computeTitle(p){
  const g=goals(p); const nw=p.estateValue!==null?p.estateValue:netWorth(p);
  if(p.dead) return {t:'未完成的旅程', q:'意外从不提前打招呼，爱要提前安排。'};
  if(p.flags.bankrupt) return {t:'破产重启者', q:'击垮人的不是亏损，是现金流断裂。'};
  if(g.freedom>=1 && p.retired) return {t:'财务自由毕业生', q:'工作从此是选择，不是必须。'};
  if(g.freedom>=1) return {t:'被动收入大师', q:'钱在替我上班，我在替生活上心。'};
  if(p.happiness>=8 && nw>=200) return {t:'人生赢家', q:'钱和功德，我全都要，也全都有了。'};
  if(p.flags.noCritWhenIll) return {t:'裸奔的勇士', q:'我用真金白银试出了保险的价格。'};
  if(p.flags.critClaim||p.flags.kidCritClaim) return {t:'保险信徒', q:'雪中送炭的，是晴天签的那张保单。'};
  if(p.flags.p2pLost&&p.flags.cryptoLost) return {t:'典藏版韭菜', q:'所有高收益，都在暗中标好了价格。'};
  if(p.flags.p2pLost||p.flags.cryptoLost) return {t:'爆雷幸存者', q:'亏掉的是钱，买回来的是常识。'};
  if(p.flags.peWin>=80) return {t:'风口捕手', q:'我知道这次是运气，所以见好就收。'};
  if(p.props.length>=3) return {t:'包租人生', q:'每月房租到账的声音，就是安全感。'};
  if(p.flags.bizFail) return {t:'倒下的小店主', q:'我试过了，这比没试过强一万倍。'};
  if(p.bizUnits>=5) return {t:'拉面大王', q:'一碗面里，有我全部的凌晨四点。'};
  if(p.diceTwoCount>=p.turnCount*0.7&&p.flags.overworkIll) return {t:'卷王的教训', q:'健康是1，其他都是后面的0。'};
  if(p.diceTwoCount>=p.turnCount*0.7) return {t:'卷王本王', q:'我把命运的骰子，掷出了加班的声音。'};
  if(p.flags.retiredEarly) return {t:'提前离席的智者', q:'我用钱买回了最贵的东西：时间。'};
  if(p.flags.wentFreelance) return {t:'自由职业掌门', q:'最好的老板，是自己的第二曲线。'};
  if(p.flags.lottery) return {t:'天选锦鲤', q:'中奖靠运气，守住靠纪律。'};
  if((p.flags.boughtLow||0)>=3 && G.infl>1.2) return {t:'温水里的储户', q:'一分没亏，只是钱悄悄变薄了。'};
  if(p.savings>=50) return {t:'储蓄纪律部长', q:'先存后花，是我唯一的理财秘诀。'};
  if(p.happiness<=0 && nw>=150) return {t:'金库守门人', q:'钱包满了，相册空了——下局改进。'};
  if(p.happiness>=6) return {t:'功德圆满', q:'该花的钱一分没省，这就是我的复利。'};
  return {t:'平凡之路', q:'不追风口不踩雷，稳稳的幸福也是本事。'};
}
function achievementsFor(p){
  const A=[]; const g=goals(p);
  if(p.flags.overworkIll) A.push('💼 双六战神');
  if(p.flags.koi) A.push('🎉 年会锦鲤');
  if(p.flags.regretUsed) A.push('💊 吃过后悔药');
  if(p.flags.p2pLost) A.push('💣 爆雷亲历者');
  if(p.flags.cryptoLost) A.push('🪙 币圈一日游');
  if(p.flags.peWin) A.push('🚀 风口起飞');
  if(p.flags.fireInsured) A.push('🔥 火场全身而退');
  if(p.flags.mba) A.push('🎒 高学历打工人');
  if(kids(p).length>=2) A.push('👶 二胎家庭');
  if(p.flags.kidStar) A.push('🎓 孩子有出息');
  if(p.flags.kidNeet) A.push('🏠 啃老户');
  if(p.spouse>=45 && !p.divorced) A.push('💑 嫁/娶对了人');
  if(p.flags.wedding) A.push('💒 体面的婚礼');
  if(p.flags.studyAbroad) A.push('🎓 留学生家长');
  if(p.flags.retiredEarly) A.push('🌇 提前退休');
  if(g.freedom>=1) A.push('🕊️ 财务自由');
  if(p.savings>=50) A.push('🔒 储蓄达人');
  if(p.saveIns.length) A.push('💰 复利收藏家');
  if(p.props.length>=2) A.push('🏠 多套房东');
  if(p.flags.hustleRaise) A.push('🌟 拼命被看见');
  if(p.flags.wentFreelance) A.push('💻 辞职单干');
  else if(p.flags.sideHustle) A.push('💻 斜杠青年');
  if(p.flags.loyal) A.push('🌙 白月光免疫');
  if(p.flags.rationalCar) A.push('🚗 反攀比战士');
  if(p.flags.lottery) A.push('🎰 天选之人');
  if(p.flags.schoolHouse) A.push('🏫 学区房家长');
  if(p.flags.rageQuit) A.push('😤 裸辞过的人');
  if(!p.flags.forcedSale&&!p.flags.bankrupt) A.push('🛟 从未卖血续命');
  return A;
}
/* 分享战报图（Canvas 生成，长按/右键保存） */
function drawShareCard(p){
  const g=goals(p); const T=computeTitle(p);
  const nw=p.estateValue!==null?p.estateValue:netWorth(p);
  const c=document.createElement('canvas'); c.width=720; c.height=1000;
  const x=c.getContext('2d');
  const gr=x.createLinearGradient(0,0,0,1000); gr.addColorStop(0,'#0f4d44'); gr.addColorStop(1,'#0a3831');
  x.fillStyle=gr; x.fillRect(0,0,720,1000);
  x.strokeStyle='rgba(201,154,60,.18)'; x.lineWidth=26;
  x.beginPath(); x.arc(600,180,150,0,7); x.stroke();
  x.strokeRect(555,135,90,90);
  x.strokeStyle='#c99a3c'; x.lineWidth=4; x.strokeRect(24,24,672,952);
  x.strokeStyle='rgba(201,154,60,.4)'; x.lineWidth=1; x.strokeRect(36,36,648,928);
  const ctr=(txt,y,font,color)=>{x.font=font; x.fillStyle=color; x.textAlign='center'; x.fillText(txt,360,y);};
  ctr('《老朱的人生账簿》战报',110,'bold 40px "Microsoft YaHei"','#f5e6be');
  ctr('一场关于金钱与幸福的桌上人生',155,'22px "Microsoft YaHei"','rgba(207,227,214,.75)');
  x.font='bold 58px "Microsoft YaHei"';
  const w2=x.measureText('「'+T.t+'」').width+60;
  x.save(); x.translate(360,265); x.rotate(-0.02);
  x.fillStyle='#c0392b'; x.fillRect(-w2/2,-52,w2,86);
  x.fillStyle='#ffe9b3'; x.textAlign='center'; x.fillText('「'+T.t+'」',0,14); x.restore();
  ctr(`${p.name} · 35岁 → ${p.age}岁${p.dead?' · 人生定格':p.flags.bankrupt?' · 破产离场':''}`,360,'26px "Microsoft YaHei"','#cfe3d6');
  const stat=(label,val,y)=>{
    x.textAlign='left'; x.font='26px "Microsoft YaHei"'; x.fillStyle='#9fc3b5'; x.fillText(label,110,y);
    x.textAlign='right'; x.font='bold 30px "Microsoft YaHei"'; x.fillStyle='#ffe9b3'; x.fillText(val,610,y);
  };
  stat(p.dead?'留给家人':'净资产', fmt(nw), 440);
  stat('功德值', String(p.happiness)+' 点', 490);
  const bar=(label,v,y)=>{
    const pct=Math.max(0,Math.min(1,v));
    x.textAlign='left'; x.font='24px "Microsoft YaHei"'; x.fillStyle='#9fc3b5';
    x.fillText(`${label}  ${Math.max(0,Math.round(v*100))}%`,110,y);
    x.fillStyle='rgba(255,255,255,.15)'; x.fillRect(110,y+14,500,16);
    x.fillStyle=v>=1?'#57a05b':'#c99a3c'; x.fillRect(110,y+14,500*pct,16);
  };
  bar('财务自由度',g.freedom,560); bar('退休覆盖度',g.retire,630); bar('风险覆盖度',g.risk,700);
  const ach=achievementsFor(p).slice(0,4).join('   ');
  if(ach) ctr(ach,780,'22px "Microsoft YaHei"','#cfe3d6');
  x.font='italic 26px "Microsoft YaHei"'; x.fillStyle='#f5e6be'; x.textAlign='center';
  x.fillText('“'+T.q+'”',360,850);
  ctr('—— 你敢来一局吗？——',920,'24px "Microsoft YaHei"','rgba(207,227,214,.7)');
  return c.toDataURL('image/png');
}
window.shareCard = idx=>{
  const p=G.players[idx];
  const url=drawShareCard(p);
  modal({title:'📸 你的人生战报', klass:'k-gold', html:
    `<div class="sharewrap"><img src="${url}" alt="战报"><div class="tip">手机：长按图片保存，发朋友圈/微信群；电脑：右键另存为。</div></div>`,
    buttons:[{label:'关闭',value:1,cls:'btn-plain'}]});
};
window.copyReport = idx=>{
  const p=G.players[idx]; const g=goals(p); const T=computeTitle(p);
  const nw=p.estateValue!==null?p.estateValue:netWorth(p);
  const txt=`我在《老朱的人生账簿》里走完了一局人生：35→${p.age}岁，净资产${fmt(nw)}，功德${p.happiness}点，财务自由度${Math.max(0,Math.round(g.freedom*100))}%。我的人生称号：「${T.t}」——${T.q} 你敢来一局吗？`;
  const done=()=>{ const b=document.getElementById('copyBtn'+idx); if(b) b.textContent='✅ 已复制，去粘贴吧'; };
  const fallback=()=>{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); done();}catch(e){} ta.remove(); };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done,fallback);
  else fallback();
};

function lessonsFor(p){
  const L=[];
  const g = goals(p);
  if(p.flags.bankrupt) L.push('<b>关于破产</b>：击垮你的不是资产缩水，而是现金流断裂。现实中，请永远保留一笔够花6-12个月支出的应急现金，别让杠杆逼你在最低点卖资产。');
  if(p.flags.died) L.push(`<b>关于寿险</b>：意外从不提前打招呼。${p.lifeIns?'那份定期寿险让家人的生活得以继续——寿险保障的从来不是自己，而是身后所爱的人。':'如果有一份定期寿险，故事的结尾会不一样。30岁投保，杠杆是10倍；55岁，只剩3倍；再往后，想买也买不到了。'}`);
  if(p.flags.noCritWhenIll) L.push('<b>关于风险</b>：你在没有重疾保障的情况下遭遇了大病。现实版本更残酷——医疗费50万、五年少赚120万的真实案例就在我们身边。<b>先保障，后投资</b>，顺序不能错。');
  if(p.flags.critClaim) L.push(`<b>关于保险</b>：重疾来袭时，${fmt(p.flags.critClaim)}的理赔金让你的家庭没有倒下。保险买的不是收益，是「无论发生什么，计划都能继续」的确定性。`);
  if(p.flags.kidIllNoIns) L.push('<b>关于孩子的保障</b>：孩子生病，大人崩溃。孩子的重疾险是全家最便宜的保单，却最常被「以后再说」。');
  if(p.flags.kidCritClaim) L.push('<b>关于孩子的保障</b>：孩子重疾险的50万理赔，让你能放下工作专心陪护——保险买的是「不必在钱和陪伴之间二选一」。');
  if(p.flags.p2pLost) L.push(`<b>关于收益率</b>：P2P爆雷让你损失了${fmt(p.flags.p2pLost)}。收益率超过6%要谨慎，超过8%很危险，超过10%就要做好损失全部本金的准备——世上没有「高收益、低风险」的午餐。`);
  if(p.flags.cryptoLost) L.push('<b>关于投机</b>：币圈那5万教会你：投资赚的是资产创造的价值，投机赚的是下一个接盘者的钱——而你不知道自己是不是最后一个。');
  if(p.flags.trustDelay) L.push('<b>关于「中风险」</b>：连正规理财也有颗粒无收的年份。任何投资都有风险，「刚性兑付」只存在于想象中。');
  if(p.flags.peWin && !p.flags.peLost) L.push(`<b>关于创业股权</b>：你的创业投资大获成功（累计落袋${fmt(p.flags.peWin)}）。但请诚实地问自己：这是能力，还是运气？现实中十个项目九个亏。`);
  if(p.flags.peLost && !p.flags.peWin) L.push(`<b>关于创业股权</b>：创业项目让你损失了${fmt(p.flags.peLost)}。高风险资产只该用「亏光也不影响生活」的钱去投。`);
  if(p.flags.bizFail) L.push('<b>关于小生意</b>：小店倒闭不丢人——个体经营的存活率本就不高。教训是：别把身家全押进去，也别高估自己能同时打两份工的精力。');
  if(p.flags.fireUninsured) L.push('<b>关于财产险</b>：一场火灾烧掉一套房。千分之一的保费，保的是百分之百的本金。');
  if(p.flags.fireInsured) L.push('<b>关于财产险</b>：火灾发生时，财产险替你挡住了全部损失。风险管理的最高境界，就是「出事了也没事」。');
  if(p.flags.mba) L.push('<b>关于人力资本</b>：你为自己充电，换来了长期加薪。对大多数人来说，40岁前最好的投资标的就是自己。');
  if(p.flags.unemployed) L.push('<b>关于失业</b>：没有收入的那两三年，你才真正理解「应急金」和「第二收入曲线」的意义。');
  if(p.flags.divorced) L.push('<b>关于婚姻与财产</b>：离婚让可分割财产减半，但以孩子为受益人的保单完整保留。家庭财务架构，值得在晴天时就搭好。');
  if(p.flags.boughtSaveIns) L.push(`<b>关于储蓄险</b>：4.5%的复利不性感，但15年锁定期帮你锁住了纪律——它防的不是市场，是自己的手。`);
  if(p.flags.retiredEarly) L.push(`<b>关于提前退休</b>：你在${p.age>=0?'':''}被动收入${goals(p).freedom>=1?'覆盖支出后':'尚未完全覆盖支出时'}选择了退休。自由不是不工作，而是可以选择不工作。`);
  if(p.savings>0 || p.flags.planDone) L.push(`<b>关于强制储蓄</b>：靠着一笔笔「先存后花」，你攒下了${fmt(p.savings)}专款。储蓄的秘诀从来不是收入高，而是纪律。`);
  if(p.flags.usedSavings) L.push('<b>关于底线</b>：你动用了强制储蓄救急——它存在的意义正在于此：专款专用，只为山穷水尽的那一天。');
  if(g.freedom>=1 && !p.dead) L.push('<b>🏆 财务自由</b>：你的非工资收入已经覆盖全部支出——从此工作是选择，不是必须。这就是理财的终极目标：用钱买回人生的选择权。');
  else if(g.freedom>=0.5) L.push(`<b>关于财务自由</b>：非工资收入已覆盖${Math.round(g.freedom*100)}%的支出，走在正确的路上。资产性收入的雪球，前半程总是慢的。`);
  else if(!p.flags.boughtProp && !p.flags.investedPE && !p.flags.stockTrades && !p.trust && !p.flags.boughtP2P && !p.flags.ranBiz && !p.dead) L.push('<b>关于「不投资」</b>：这一程你几乎只靠工资。看起来最安全，实际上把全部身家押在了「健康+就业+通胀温和」上——不投资，本身就是一种高风险。');
  if((p.flags.boughtLow||0)>=3 && G.infl>1.2) L.push(`<b>关于通胀</b>：低风险理财1.5%的收益看似安稳，但这些年物价涨了${Math.round((G.infl-1)*100)}%。不承担任何波动的代价，是购买力持续缩水——<b>「绝对安全」本身就是一种风险</b>。`);
  if(p.happiness>=6) L.push(`<b>关于幸福</b>：${p.happiness}点功德值——你在该花钱的地方没有吝啬。钱是工具，幸福才是目的。`);
  else if(p.happiness<=0 && !p.dead) L.push('<b>关于幸福</b>：婚礼从简、旅行取消、心愿搁置……账户余额上去了，生活的滋味却淡了。攒钱的终极目的，是过好这一生。');
  if(!p.flags.boughtCrit && !p.flags.illness && !p.dead) L.push('<b>关于运气</b>：这一程你没生大病，也没买重疾险——你赢了骰子，但现实中没人能保证永远掷不出那个点数。');
  return L;
}
function realityCheck(p){
  const nw = p.estateValue!==null?p.estateValue:netWorth(p);
  const exp = Math.max(1, living(p) + (p.insMedSelf?0:p.medicalExtra));
  const pass = passiveIncome(p);
  /* 资产盘点 */
  const has=[];
  if(p.props.length) has.push(`${p.props.length}套房产`);
  if(p.blue||p.gem) has.push(`市值${fmt(stockValue(p))}的基金股票`);
  if(p.low+p.trust+p.p2p>0) has.push(`${fmt((p.low+p.trust+p.p2p)*10)}理财`);
  if(p.saveIns.length) has.push(`${fmt(p.saveIns.reduce((s,x)=>s+x.value,0))}储蓄险`);
  if(p.savings>0) has.push(`${fmt(p.savings)}强制储蓄`);
  if(p.bizUnits) has.push('一家小店');
  if(p.side&&p.side.income) has.push(`年入${fmt(p.side.income)}的副业`);
  let asset;
  if(p.dead) asset = `人生定格在${p.age}岁，留给家人的全部是 ${fmt(nw)}${p.lifeIns?'（含寿险理赔）':'（没有任何寿险）'}。`;
  else if(p.flags.bankrupt) asset = `破产离场。半生打拼，清算后只剩 ${fmt(Math.max(0,nw))}。`;
  else if(!has.length) asset = `${p.age}岁的你名下<b>没有任何资产</b>，全部身家就是手里的 ${fmt(p.cash)} 现金。`;
  else asset = `${p.age}岁的你拥有：${has.join('、')}，加上现金${fmt(p.cash)}，净资产 ${fmt(nw)}。`;
  /* 晚年购买力 */
  let old='';
  if(!p.dead && !p.flags.bankrupt){
    if(pass>=exp) old = `你的被动收入（${fmt(pass)}/年）已经覆盖了年开销（${fmt(exp)}）——<b class="pos">不动本金也能安度晚年，真正的高枕无忧。</b>`;
    else {
      const yrs = Math.floor(nw/(exp-pass));
      const needTo = 85-p.age;
      old = `按现在每年${fmt(exp)}的开销、${fmt(pass)}的被动收入，这份家底还能支撑约 <b>${yrs} 年</b>（撑到${p.age+yrs}岁）。`
        + (yrs>=needTo?'<b class="pos">活到85岁绰绰有余，晚年无虞。</b>'
          : yrs>=needTo*0.6?'<b style="color:#b9770e">大体够用，但一场大病或一轮通胀就可能打破平衡，要精打细算。</b>'
          : `<b class="neg">远远不够——${p.age+yrs}岁之后的日子怎么办？这是这局游戏留给你最扎心的问题。</b>`);
    }
    if(G.infl>1.3 && (p.low>=3) && !p.props.length && !p.blue && !p.gem) old += `<br>另外提醒：这些年物价累计上涨了${Math.round((G.infl-1)*100)}%，而你的钱大多躺在低风险理财里——账面没亏，<b class="neg">购买力已经缩水了一大截</b>。`;
  }
  return `<div class="lesson" style="border-left-color:#34495e"><b>📋 现实盘点</b>：${asset}<br>${old}</div>`;
}
function showSummary(){
  if(G.over) return; G.over=true;
  $('#game').classList.add('hidden');
  const el = $('#summaryPage');
  el.classList.remove('hidden');
  const val = p => p.estateValue!==null?p.estateValue:netWorth(p);
  const rank = [...G.players].sort((a,b)=>val(b)-val(a));
  let html = `<div class="panel"><h3>🏁 人生复盘</h3>
    <div class="intro"><p>游戏结束了，但它留下的问题才刚刚开始：如果这是真实的人生，你会做出同样的选择吗？</p></div>
    ${rank.map((p,i)=>`<div class="rankline">${['🥇','🥈','🥉','🏅'][i]||''} <b>${p.name}</b> ${p.dead?'遗产':'净资产'} <b class="money">${fmt(val(p))}</b> · 功德 ${p.happiness} ${p.flags.bankrupt?'<span class="badge" style="background:var(--bad)">破产</span>':''}${p.dead?'<span class="badge" style="background:#555">🕯️</span>':''}${p.retired?'<span class="badge">🌇提前退休</span>':''}</div>`).join('')}
    <div class="intro" style="margin-top:8px"><p style="font-size:13px;color:var(--ink-soft)">名次以净资产排序——但这不一定是「赢」的唯一标准。</p></div></div>`;
  G.players.forEach(p=>{
    const g = goals(p);
    const majors = p.events.filter(e=>e.major);
    const L = lessonsFor(p);
    const T = computeTitle(p); const ach = achievementsFor(p);
    html += `<div class="panel pcard">
      <h3>👤 ${p.gender==='f'?'👩':'👨'} ${p.name} 的这些年（35→${p.age}岁）</h3>
      <div class="lifetitle">「${T.t}」</div>
      <div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:4px">“${T.q}”</div>
      ${ach.length?`<div class="achrow">${ach.map(a=>`<span class="ach">${a}</span>`).join('')}</div>`:''}
      <div class="ovrow" style="display:flex;gap:14px;flex-wrap:wrap;font-size:14.5px">
        <span>净资产 <b class="money">${fmt(val(p))}</b></span>
        <span>现金 <b class="money">${fmt(p.cash)}</b></span>
        <span>强制储蓄 <b class="money">${fmt(p.savings)}</b></span>
        <span>储蓄险 <b class="money">${fmt(p.saveIns.reduce((s,x)=>s+x.value,0))}</b></span>
        <span>功德值 <b>${p.happiness}</b></span>
      </div>
      <div class="goalbars">
        ${goalBarHTML('🕊️ 财务自由度', g.freedom)}
        ${goalBarHTML('🌅 退休覆盖度', g.retire)}
        ${goalBarHTML('🛡️ 风险覆盖度', g.risk)}
      </div>
      ${realityCheck(p)}
      <div style="margin-top:10px;font-weight:700;font-size:14px">📜 大事记</div>
      <div class="lifeline">${majors.length?majors.map(e=>`<div>· ${e.age}岁 ${e.icon} ${e.text}</div>`).join(''):'平平淡淡才是真——这一程没有惊涛骇浪。'}</div>
      <div style="margin-top:12px;font-weight:700;font-size:14px">✉️ 一封信</div>
      <div class="letter">${buildLetter(p)}</div>
      ${L.map(x=>`<div class="lesson">${x}</div>`).join('')}
      <div class="btnrow" style="justify-content:flex-start">
        <button class="btn-gold btn-sm" onclick="shareCard(${p.idx})">📸 生成分享战报图</button>
        <button class="btn-plain btn-sm" id="copyBtn${p.idx}" onclick="copyReport(${p.idx})">📋 复制战报文案</button>
      </div>
    </div>`;
  });
  html += `<div class="panel"><h3>🧭 写在最后 · 人生的五件事</h3><div class="intro">
    <p><b>1. 花钱</b>——这是肯定的。区分「需要」与「想要」，但别忘了：钱是让生活更幸福的工具。</p>
    <p><b>2. 赚钱</b>——这是不一定的。持续提高自己的人力资本，并保护好它。</p>
    <p><b>3. 管理投资</b>——有赚有亏。收益与风险永远成对出现，分散、长期、买自己看得懂的东西。</p>
    <p><b>4. 达成目标</b>——看你自己的想法。财务自由不是数字游戏，而是拥有说「不」的权利。</p>
    <p><b>5. 管理风险</b>——最容易被忽略的一件事。回避、防御、转移、自留，四种手段里，保险是普通家庭最锋利的一把伞。</p>
    <p style="margin-top:10px;color:var(--ink-soft)">愿你在真实的人生里，走得比游戏里更从容。——老朱</p></div>
    <div class="btnrow"><button class="btn-main" onclick="location.reload()">🔄 再来一局人生</button></div></div>`;
  el.innerHTML = html;
  window.scrollTo({top:0});
}

let numPlayers=1;
function renderSetup(){
  const sp = $('#segPlayers'); sp.innerHTML='';
  [1,2,3,4].forEach(n=>{
    const b=document.createElement('button'); b.textContent=n+'人'; if(n===numPlayers)b.classList.add('on');
    b.onclick=()=>{numPlayers=n; renderSetup();};
    sp.appendChild(b);
  });
  const ni = $('#nameInputs'); ni.innerHTML='';
  for(let i=0;i<numPlayers;i++){
    const lb=document.createElement('label'); lb.textContent=`玩家${i+1} 昵称与性别`;
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;align-items:center';
    const inp=document.createElement('input'); inp.type='text'; inp.id='nm'+i; inp.value = ['老朱','小智','小勇','小慧'][i]; inp.maxLength=8; inp.style.flex='1';
    const seg=document.createElement('div'); seg.className='seg'; seg.id='gd'+i;
    seg.innerHTML = `<button data-g="m" class="on">👨 男</button><button data-g="f">👩 女</button>`;
    seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{ seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); });
    row.appendChild(inp); row.appendChild(seg);
    ni.appendChild(lb); ni.appendChild(row);
  }
}
$('#yearsRange').oninput = e=>{ G.maxYears=+e.target.value; $('#yearsVal').textContent = G.maxYears+' 年'; };
$('#btnHow').onclick = ()=> info('📖 玩法说明', `
  <div class="intro">
  <p><b>基本流程</b>：轮到你时选择掷1粒或2粒骰子，按点数顺时针前进，一圈=一年。掷2粒走得快，但掷出双6会「积劳成疾」。</p>
  <p><b>银行（路过即触发）</b>：结算全年现金流，理财/P2P/创业股权/小店掷骰看结果，还可买理财、储蓄险，或选择提前退休。</p>
  <p><b>保险公司（路过即触发）</b>：医疗险（本人/父母/孩子）、重疾险（本人/孩子）、定期寿险（30-55岁）、财产险、储蓄险。得过重疾就买不了医疗险了——保障要趁健康时安排。</p>
  <p><b>停留格</b>：证券公司按市价买卖红利基金/创业板（价格每年更新，年末播报涨跌和你的盈亏）、住宅/学区房/商铺（可贷款，差首付可八折凑钱）、创业股权、小微企业（3份以上主业工资打6折）、人生事件卡（含买车换车、副业机会、职场家庭百态）、宏观新闻卡、薪资调整（40岁后基本不涨了）、后悔药。</p>
  <p><b>你的起点</b>：35岁（可选男女），年薪30万，另一半收入随缘分随机（0~60万），生活开支18万/年，现金30万，有一个3岁的孩子。孩子23岁毕业时掷骰定前程（教育投入加成，但运气为主）。到60岁退休（政策可能延迟到65）或主动提前退休时，游戏结束并盘点晚年购买力。</p>
  <p><b>目标</b>：终局看三个指标——财务自由度、退休覆盖度、风险覆盖度，还有你的功德值。最后，会有一封信。</p>
  </div>`, '', '📖');
$('#btnEndEarly').onclick = async ()=>{
  const ok = await modal({title:'🏁 提前结束', html:'<div class="desc">确定现在就结束游戏、直接进入人生复盘吗？</div>',
    buttons:[{label:'继续玩',value:false,cls:'btn-plain'},{label:'结束并复盘',value:true}]});
  if(ok) showSummary();
};
$('#btnStart').onclick = ()=>{
  G.players = [];
  for(let i=0;i<numPlayers;i++){
    const nm = ($('#nm'+i).value||'').trim() || `玩家${i+1}`;
    const pl = newPlayer(nm, i);
    pl.gender = document.querySelector('#gd'+i+' button.on').dataset.g;
    G.players.push(pl);
  }
  G.expDeck = shuffle(makeExpenseDeck().slice());
  G.newsDeck = shuffle(makeNewsDeck().slice());
  $('#setup').classList.add('hidden');
  $('#game').classList.remove('hidden');
  $('#ovPanel').classList.remove('hidden');
  $('#logPanel').classList.remove('hidden');
  buildBoard(); renderTokens();
  G.turn = 0;
  const spouseLines = G.players.map(pl=>`${pl.name} 的另一半年收入：<b>${fmt(pl.spouse)}</b>${pl.spouse===0?'（全职照顾家庭）':pl.spouse>=45?'（大腿！）':''}`).join('<br>');
  G.players.forEach(pl=>log(pl, `人生开局：与另一半组建家庭，TA的年收入 ${fmt(pl.spouse)}。`));
  info('🌅 人生开局', `每位玩家：35岁，年薪<b>30万</b>，一般生活开支<b>18万/年</b>，手握现金<b>30万</b>，家有一个3岁的孩子。<br><br>缘分抽签——<br>${spouseLines}<br><br>游戏在<b>${G.retireAge}岁退休</b>或你选择提前退休时结束——那时我们一起看看，你攒下的家底够不够安度晚年。祝你好运。`, 'k-gold', '', '出发！')
    .then(()=> takeTurn());
};
renderSetup();
</script>
