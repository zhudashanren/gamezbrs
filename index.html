<meta charset="utf-8">
<title>老朱的人生账簿 · 一场关于金钱与幸福的桌上人生</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
:root{
  --felt:#0e4a41; --felt-deep:#0a3831; --paper:#fbf6ea; --paper-dim:#f1e9d6;
  --ink:#2b241a; --ink-soft:#6b5f4c; --cinnabar:#c0392b; --gold:#c99a3c; --gold-deep:#a97c22;
  --news:#6d4fa1; --good:#2e7d32; --bad:#c0392b;
  --cell-bank:#c99a3c; --cell-stock:#b03a2e; --cell-house:#2e7d5b; --cell-shop:#1f618d;
  --cell-pe:#8e44ad; --cell-biz:#b9770e; --cell-news:#6d4fa1; --cell-exp:#922b21;
  --cell-ins:#148f9d; --cell-sal:#7d6608; --cell-regret:#c2185b;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
html,body{background:var(--felt-deep)}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink); min-height:100vh; font-size:15.5px;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(255,255,255,.07), transparent 60%),
    repeating-linear-gradient(45deg, rgba(0,0,0,.04) 0 2px, transparent 2px 6px),
    var(--felt);
  padding:14px 10px 60px;
}
.money,.num{font-variant-numeric:tabular-nums}
h1.title{
  font-family:"Noto Serif SC","Songti SC",SimSun,serif;
  color:var(--paper); text-align:center; font-size:32px; letter-spacing:.1em;
  text-shadow:0 2px 0 rgba(0,0,0,.35); margin:4px 0 2px;
}
.subtitle{text-align:center; color:#cfe3d6; font-size:13px; letter-spacing:.3em; margin-bottom:14px; opacity:.85}
.subtitle b{color:var(--gold)}

.layout{max-width:1600px; margin:0 auto; display:grid; grid-template-columns:1fr; gap:14px}
.col-main{min-width:0}
@media (min-width:1100px){
  .layout{grid-template-columns:minmax(280px,26%) minmax(500px,720px) minmax(300px,28%); align-items:start; justify-content:center}
  .col-left,.col-right{position:sticky; top:12px; max-height:calc(100vh - 24px); overflow-y:auto}
  .col-left{order:1}.col-main{order:2}.col-right{order:3}
}

.panel{
  background:var(--paper); border-radius:10px; padding:14px;
  box-shadow:0 3px 0 rgba(0,0,0,.25), inset 0 0 0 1px rgba(0,0,0,.08);
  margin-bottom:12px;
}
.panel h3{
  font-family:"Noto Serif SC","Songti SC",SimSun,serif; font-size:17px; letter-spacing:.1em;
  border-bottom:2px solid var(--gold); padding-bottom:6px; margin-bottom:10px; color:var(--ink);
}
button{
  font-family:inherit; border:none; cursor:pointer; border-radius:8px;
  font-size:16px; padding:11px 18px; font-weight:600;
}
button:focus-visible{outline:3px solid var(--gold); outline-offset:2px}
.btn-main{background:var(--cinnabar); color:#fff; box-shadow:0 3px 0 #7e241a}
.btn-main:active{transform:translateY(2px); box-shadow:0 1px 0 #7e241a}
.btn-gold{background:var(--gold); color:#fff; box-shadow:0 3px 0 var(--gold-deep)}
.btn-gold:active{transform:translateY(2px); box-shadow:0 1px 0 var(--gold-deep)}
.btn-plain{background:#e8e0cd; color:var(--ink); box-shadow:0 3px 0 #beb49b}
.btn-plain:active{transform:translateY(2px); box-shadow:0 1px 0 #beb49b}
.btn-sm{font-size:14px; padding:7px 12px}
.btnrow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:12px}

/* ===== 开局 ===== */
.setup label{display:block; font-size:14px; color:var(--ink-soft); margin:12px 0 4px}
.setup input[type=text]{
  width:100%; padding:10px 12px; border:1px solid #cbbfa3; border-radius:8px;
  font-size:16px; background:#fff; font-family:inherit;
}
.seg{display:flex; gap:6px; flex-wrap:wrap}
.seg button{background:#e8e0cd; color:var(--ink); box-shadow:none; border:1px solid #cbbfa3; padding:9px 16px}
.seg button.on{background:var(--cinnabar); color:#fff; border-color:var(--cinnabar)}
.intro{font-size:14.5px; line-height:1.9; color:var(--ink)}
.intro p{margin-bottom:8px}
.intro .stamp{color:var(--cinnabar); font-weight:700}
input[type=range]{width:100%; accent-color:var(--cinnabar); height:32px}
.range-val{font-size:18px; font-weight:800; color:var(--cinnabar)}

/* ===== 棋盘 ===== */
.board-outer{position:relative; width:100%; aspect-ratio:1/1; margin-bottom:12px}
.board{
  position:absolute; inset:0; display:grid;
  grid-template-columns:1.45fr repeat(8,1fr) 1.45fr;
  grid-template-rows:1.45fr repeat(8,1fr) 1.45fr; gap:2px;
  background:var(--felt-deep); padding:4px; border-radius:12px;
  box-shadow:0 4px 18px rgba(0,0,0,.4), inset 0 0 0 2px var(--gold);
}
.cell{
  position:relative; background:var(--paper); border-radius:5px; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:11px; line-height:1.15; text-align:center; padding:1px;
  border-top:5px solid #999; transition:transform .15s;
}
.cell .ico{font-size:19px}
.cell .nm{white-space:nowrap; color:var(--ink); font-weight:700; font-size:10.5px; letter-spacing:0}
@media (max-width:480px){ .cell .ico{font-size:15px} .cell .nm{font-size:9px; transform:scale(.92)} }
.cell.active-cell{
  background:#fff3c4; z-index:5; transform:scale(1.12);
  box-shadow:0 0 0 3px var(--glowc,var(--gold)), 0 0 18px 5px var(--glowc,var(--gold));
  animation:cellpulse .9s infinite alternate;
}
@keyframes cellpulse{from{filter:brightness(.96)} to{filter:brightness(1.12)}}
.tokens{position:absolute; left:1px; bottom:1px; display:flex; gap:1px; flex-wrap:wrap; max-width:100%}
.token{
  width:16px; height:16px; border-radius:50%; font-size:10px; line-height:16px; text-align:center;
  color:#fff; font-weight:700;
  box-shadow:0 1px 2px rgba(0,0,0,.5), 0 0 9px 3px var(--tc,transparent);
}
.center{
  position:absolute; inset:15.5%; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  background:radial-gradient(ellipse at 50% 30%, #17635a, var(--felt) 75%);
  box-shadow:inset 0 0 0 2px rgba(201,154,60,.5), inset 0 0 40px rgba(0,0,0,.35);
  padding:8px; text-align:center;
}
.center .who{color:var(--paper); font-size:21px; font-weight:800; letter-spacing:.05em}
.center .who b{color:var(--gold)}
.center .yearline{color:#bcd8cc; font-size:14.5px}
.center .cashline{color:#ffe9b3; font-size:17px; font-weight:800}
.center .hint{color:#b9d6c8; font-size:13px; max-width:94%; line-height:1.5}

/* ===== 圆角骰子 ===== */
.dicetray{display:flex; gap:10px; justify-content:center; min-height:56px; align-items:center}
.die{
  width:52px; height:52px; background:linear-gradient(145deg,#fff,#ecebe4);
  border-radius:14px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  padding:7px; box-shadow:inset -2px -3px 5px rgba(0,0,0,.18), inset 2px 2px 4px #fff, 0 5px 10px rgba(0,0,0,.45);
}
.die .pip{width:9px; height:9px; border-radius:50%; background:#b03a2e; place-self:center; box-shadow:inset 0 2px 2px rgba(0,0,0,.4); visibility:hidden}
.die.rolling{animation:tumble .5s linear infinite}
@keyframes tumble{
  0%{transform:rotate(0deg) translateY(0) scale(1)}
  25%{transform:rotate(90deg) translateY(-9px) scale(1.08)}
  50%{transform:rotate(180deg) translateY(0) scale(.96)}
  75%{transform:rotate(270deg) translateY(-6px) scale(1.05)}
  100%{transform:rotate(360deg) translateY(0) scale(1)}
}
@media (prefers-reduced-motion:reduce){ .die.rolling{animation:none} .cell.active-cell{animation:none} .card{animation:none} }
.die-sm{width:44px; height:44px; border-radius:12px; padding:6px}
.die-sm .pip{width:8px; height:8px}

/* ===== 玩家总览（左栏） ===== */
.ovcard{
  border-left:6px solid #999; background:#fff; border-radius:8px; padding:9px 11px;
  margin-bottom:8px; font-size:13.5px; box-shadow:0 1px 3px rgba(0,0,0,.12);
}
.ovcard.active{background:#fff8dd; box-shadow:0 0 0 2px var(--gold)}
.ovcard .ovname{font-weight:800; font-size:15px}
.ovcard .ovrow{display:flex; flex-wrap:wrap; gap:2px 12px; color:var(--ink-soft); margin-top:2px}
.ovcard .ovrow b{color:var(--ink)}
.ovcard .ovassets{margin-top:4px; font-size:12.5px; color:var(--ink-soft); line-height:1.7}
.goalbars{margin-top:8px; display:grid; gap:6px}
.goalbar{font-size:12px; color:var(--ink-soft)}
.goalbar .bar{height:9px; background:#e4dac2; border-radius:5px; overflow:hidden; margin-top:2px}
.goalbar .fill{height:100%; background:linear-gradient(90deg,var(--gold),#e2b95e); border-radius:5px; transition:width .5s}
.goalbar .fill.done{background:linear-gradient(90deg,#2e7d32,#57a05b)}

/* ===== 日志（右栏） ===== */
.log{max-height:420px; overflow-y:auto; font-size:13.5px; line-height:1.85; color:var(--ink-soft)}
@media (min-width:1100px){ .log{max-height:calc(100vh - 140px)} }
.log .yr{color:var(--gold-deep); font-weight:700}
.log .major{color:var(--cinnabar); font-weight:600}

/* ===== 弹窗卡牌 ===== */
.overlay{
  position:fixed; inset:0; background:rgba(6,30,26,.74); z-index:50;
  display:flex; align-items:center; justify-content:center; padding:14px;
  backdrop-filter:blur(2px);
}
.card{
  width:100%; max-width:520px; max-height:88vh; overflow-y:auto;
  background:var(--paper); border-radius:14px;
  box-shadow:0 10px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.1);
  animation:pop .18s ease-out;
}
@keyframes pop{from{transform:scale(.92); opacity:0} to{transform:scale(1); opacity:1}}
.card .head{
  padding:13px 16px; color:#fff; font-weight:800; font-size:19px; letter-spacing:.06em;
  font-family:"Noto Serif SC","Songti SC",SimSun,serif;
  background:var(--cinnabar); border-radius:14px 14px 0 0;
  display:flex; align-items:center; gap:8px;
}
.card.k-news .head{background:var(--news)}
.card.k-gold .head{background:var(--gold-deep)}
.card.k-teal .head{background:#148f9d}
.card.k-green .head{background:#2e7d5b}
.card.k-ink .head{background:#34495e}
.card .body{padding:16px; font-size:15.5px; line-height:1.85}
.card .body .desc{margin-bottom:8px}
.card .body .rule{
  background:#fff; border:1px dashed #c9b98f; border-radius:8px; padding:9px 12px;
  color:#1a4d8f; font-size:14px; line-height:1.75; margin:8px 0;
}
.card .body .tip{
  margin-top:10px; padding:9px 12px; background:#f3ecdc; border-left:3px solid var(--gold);
  font-size:13.5px; color:var(--ink-soft); line-height:1.75; border-radius:0 6px 6px 0;
}
.card .body .tip b{color:var(--gold-deep)}
.card .foot{padding:0 16px 16px; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end}
.card input[type=number]{
  width:120px; padding:9px; border:1px solid #cbbfa3; border-radius:8px; font-size:17px;
  font-family:inherit; background:#fff;
}
.qtyrow{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:8px 0}
.stmt{width:100%; border-collapse:collapse; font-size:14.5px; margin:6px 0}
.stmt td{padding:4px 4px; border-bottom:1px dashed #ddd2b8}
.stmt td:last-child{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap}
.stmt tr.sum td{font-weight:800; border-bottom:none; border-top:2px solid var(--gold)}
.stmt.nw td:first-child{white-space:nowrap; width:1%; padding-right:12px}
.stmt.nw td:last-child{white-space:normal}
.card{overflow-x:hidden}
.pos{color:var(--good)} .neg{color:var(--bad)}
.capline{font-size:14px; color:var(--ink-soft); margin-top:4px}
.capline b{color:var(--cinnabar)}

/* ===== 总结 ===== */
.summary .pcard{border-top:6px solid var(--gold); margin-bottom:14px}
.summary .lifeline{font-size:13.5px; line-height:1.9; color:var(--ink-soft); margin-top:6px;
  max-height:240px; overflow-y:auto; background:#fff; border-radius:8px; padding:9px 12px; border:1px solid #e6dcc2}
.summary .lesson{margin-top:8px; padding:10px 13px; background:#fdf3e0; border-radius:8px;
  border-left:4px solid var(--cinnabar); font-size:14px; line-height:1.8}
.summary .lesson b{color:var(--cinnabar)}
.letter{
  margin-top:12px; background:#fffdf5; border:1px solid #e0d5b8; border-radius:8px;
  padding:18px 20px; font-family:"Noto Serif SC","Songti SC",SimSun,serif;
  font-size:15px; line-height:2.1; color:#3d342a; white-space:pre-wrap;
  box-shadow:inset 0 0 30px rgba(201,154,60,.08);
}
.badge{display:inline-block; padding:2px 9px; border-radius:20px; font-size:12px; color:#fff; background:var(--gold-deep); margin-right:4px}
.rankline{font-size:15px; margin:5px 0}
.logtabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
.logtabs button{font-size:13px; padding:5px 12px; border-radius:16px; background:#e8e0cd; color:var(--ink); box-shadow:none; border:1px solid #cbbfa3}
.logtabs button.on{color:#fff; border-color:transparent}
.lifetitle{
  display:inline-block; margin:6px 0; padding:6px 16px; border-radius:8px;
  background:linear-gradient(135deg,#c0392b,#8e2418); color:#ffe9b3;
  font-family:"Noto Serif SC","Songti SC",SimSun,serif; font-size:20px; font-weight:800; letter-spacing:.15em;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.achrow{display:flex; flex-wrap:wrap; gap:6px; margin:8px 0}
.ach{font-size:12.5px; padding:3px 10px; border-radius:14px; background:#f3ecdc; border:1px solid #d8c99e; color:var(--ink-soft)}
.sharewrap{text-align:center}
.sharewrap img{max-width:100%; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.35)}
.happytoast{
  position:fixed; top:14%; left:50%; z-index:99; pointer-events:none;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#e8b64c,#c99a3c); color:#fff;
  font-size:22px; font-weight:800; padding:12px 26px; border-radius:40px;
  box-shadow:0 8px 24px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.4);
  animation:happypop 2s ease-out forwards;
}
@keyframes happypop{
  0%{transform:translate(-50%,20px) scale(.6); opacity:0}
  15%{transform:translate(-50%,0) scale(1.15); opacity:1}
  25%{transform:translate(-50%,0) scale(1)}
  75%{transform:translate(-50%,-6px) scale(1); opacity:1}
  100%{transform:translate(-50%,-30px) scale(.9); opacity:0}
}
@media (prefers-reduced-motion:reduce){ .happytoast{animation:none; opacity:1} }
.token.cur{animation:tokblink .8s ease-in-out infinite alternate}
@keyframes tokblink{
  from{box-shadow:0 1px 2px rgba(0,0,0,.5), 0 0 6px 2px var(--tc,transparent); transform:scale(1)}
  to{box-shadow:0 1px 2px rgba(0,0,0,.5), 0 0 16px 6px var(--tc,transparent); transform:scale(1.25)}
}
.hidden{display:none !important}
.endbtn-row{display:flex; justify-content:center; margin-bottom:12px}
</style>

        <div class="center" id="center">
          <div class="who" id="cWho"></div>
          <div class="yearline" id="cYear"></div>
          <div class="cashline money" id="cCash"></div>
          <div class="dicetray" id="cDice"></div>
          <div id="cBtns" class="btnrow" style="margin-top:2px"></div>
          <div class="hint" id="cHint"></div>
        </div>
      </div>
      <div class="endbtn-row"><button class="btn-plain btn-sm" id="btnEndEarly">🏁 提前结束游戏，直接复盘</button></div>
    </div>

    <!-- 总结 -->
    <div id="summaryPage" class="hidden summary"></div>
  </div>

  <div class="col-right" id="colRight">
    <div class="panel hidden" id="logPanel"><h3>📜 人生大事记</h3><div class="logtabs" id="logTabs"></div><div class="log" id="logBox"></div></div>
  </div>
</div>

<div id="modalRoot"></div>

<script>
"use strict";
/* ================= 工具 ================= */
const $ = s => document.querySelector(s);
const rnd = n => Math.floor(Math.random()*n);
const die = () => 1 + rnd(6);
const fmt = v => {
  const x = Math.round(v*10)/10;
  return (x<0?'-':'') + Math.abs(x).toLocaleString('zh-CN',{maximumFractionDigits:1}) + '万';
};
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]];} return a; }
/* 页面不可见时跳过延时（避免后台标签页计时器节流导致流程停滞） */
const sleep = ms => document.hidden ? Promise.resolve() : new Promise(r=>setTimeout(r,ms));

/* 圆角骰子 DOM：pip 位置 = 九宫格索引 */
const PIP_MAP = {1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function dieHTML(v, small){
  let pips='';
  for(let i=0;i<9;i++) pips += `<span class="pip" style="visibility:${PIP_MAP[v]&&PIP_MAP[v].includes(i)?'visible':'hidden'}"></span>`;
  return `<div class="die ${small?'die-sm':''}" data-v="${v}">${pips}</div>`;
}
function setDie(el, v){
  el.dataset.v=v;
  [...el.children].forEach((p,i)=>p.style.visibility = PIP_MAP[v].includes(i)?'visible':'hidden');
}
/* 在容器里播放掷骰动画，落定为 vals */
async function animateDice(container, vals, small){
  container.innerHTML = vals.map(v=>dieHTML(die(), small)).join('');
  const dies = [...container.querySelectorAll('.die')];
  dies.forEach(d=>d.classList.add('rolling'));
  for(let t=0;t<7;t++){ dies.forEach(d=>setDie(d, die())); await sleep(90); }
  dies.forEach((d,i)=>{ d.classList.remove('rolling'); setDie(d, vals[i]); });
  await sleep(250);
}

/* ================= 弹窗引擎 ================= */
function modal({title, icon='', klass='', html='', buttons=[], onopen=null}){
  return new Promise(res=>{
    const ov = document.createElement('div'); ov.className='overlay';
    const kd = document.createElement('div'); kd.className='card '+klass;
    kd.innerHTML = `<div class="head">${icon} ${title}</div><div class="body">${html}</div><div class="foot"></div>`;
    const foot = kd.querySelector('.foot');
    buttons.forEach(b=>{
      const el = document.createElement('button');
      el.className = b.cls||'btn-main'; el.textContent = b.label;
      el.onclick = ()=>{
        let v = b.value;
        if(b.pick) v = b.pick(kd);
        if(v===undefined) v = b.value;
        if(b.validate && !b.validate(kd)) return;
        ov.remove(); res(v);
      };
      foot.appendChild(el);
    });
    ov.appendChild(kd); $('#modalRoot').appendChild(ov);
    if(onopen) onopen(kd);
  });
}
const info = (title, html, klass='', icon='', label='知道了') =>
  modal({title, icon, klass, html, buttons:[{label, value:true}]});

/* ================= 棋盘（36格） ================= */
const CT = {
  bank:   {nm:'银行',   ico:'🏦', c:'var(--cell-bank)'},
  stock:  {nm:'证券',   ico:'📈', c:'var(--cell-stock)'},
  exp:    {nm:'人生事件', ico:'🧾', c:'var(--cell-exp)'},
  house:  {nm:'住宅',   ico:'🏠', c:'var(--cell-house)'},
  shop:   {nm:'商铺',   ico:'🏬', c:'var(--cell-shop)'},
  pe:     {nm:'创业股权', ico:'🚀', c:'var(--cell-pe)'},
  biz:    {nm:'小微企业', ico:'🍜', c:'var(--cell-biz)'},
  news:   {nm:'宏观新闻', ico:'📰', c:'var(--cell-news)'},
  ins:    {nm:'保险',   ico:'🛡️', c:'var(--cell-ins)'},
  sal:    {nm:'薪资',   ico:'💼', c:'var(--cell-sal)'},
  regret: {nm:'后悔药',  ico:'💊', c:'var(--cell-regret)'},
};
const CELLS = ['bank','exp','stock','house','exp','sal','exp','shop','exp','biz',
 'news','exp','house','exp','pe','exp','shop','ins','exp','stock',
 'exp','biz','pe','exp','news','house','exp','exp','biz','regret',
 'exp','shop','exp','stock','exp','pe'];
const BANK_I = 0, INS_I = 17;
function gridPos(i){
  if(i<=9)  return [1, i+1];
  if(i<=17) return [i-8, 10];
  if(i<=27) return [10, 10-(i-18)];
  return [10-(i-27), 1];
}

/* ================= 全局状态 ================= */
const G = {
  players:[], turn:-1, maxYears:15, over:false,
  infl:1, rateF:1, medF:1, critF:1, houseIdx:1, retireF:1,
  price:{fund:10, gem:10}, snap:{fund:10, gem:10}, chg:{fund:0, gem:0}, marketYear:0, retireAge:60,
  expDeck:[], newsDeck:[],
};
const TOKEN_COLORS = ['#c0392b','#1f618d','#7d6608','#6d4fa1'];
const TOKEN_ICONS  = ['甲','乙','丙','丁'];
const HOUSE_BASE = 100;
const PROP_CONF = {
  house:{nm:'住宅', price:100, loan:70, pay:5, rent:2.5, term:30},
  school:{nm:'学区房', price:200, loan:140, pay:10, rent:2.5, term:30},
  shop:{nm:'商铺', price:100, loan:60, pay:5, rent:8, term:20},
};
const propPrice = t => PROP_CONF[t].price * G.houseIdx;
const LOW_RATE = 0.015, TRUST_RATE = 0.06, P2P_RATE = 0.13;   // 与利率联动：×G.rateF

function rollSpouse(){
  return Math.random()<0.7 ? Math.round(Math.random()*30) : Math.round(30+Math.random()*30);
}
function newPlayer(name, idx){
  return {
    idx, name, pos:0, out:false, done:false, dead:false,
    age:35, year:0, cash:30, happiness:0, gender:'m',
    salary:30, salaryF:1, livingBase:18,
    spouse: rollSpouse(),   /* 另一半年收入：70%概率不高于你，30%概率高于你（上限2倍） */
    childrenList:[{age:3, wed:false}],
    medicalExtra:0,
    bizUnits:0, bizPenalty:0,
    pe:[], low:0, trust:0, p2p:0,
    blue:0, gem:0, blueCost:0, gemCost:0,
    props:[],
    insMedSelf:false, insMedParents:false, insMedKids:false, insProp:false,
    insCrit:null, insCritKids:null, lifeIns:null,
    saveIns:[],                 // 储蓄险 [{owner:'self'|'child', principal, value, years}]
    savings:0, plans:[],
    tuitionYears:0, unemployed:0, unempPaid:0, illness:false, oneDie:false,
    stamina:12, diceTwoCount:0, turnCount:0,
    side:null, mainQuit:false, hasCar:false, carLux:false, intlSchool:false,
    maternity:0, pendingCards:[{id:'car1', due:1+Math.floor(Math.random()*2)}],
    retired:false, divorced:false,
    pendingIncome:[],           // [{label, amt}] 下次结算入账
    ledger:[],                  // 年内已实时入账的大额收支（结算时展示后清空）
    regret:'none',
    events:[], flags:{},
    lastExpense:15, estateValue:null,
  };
}
const kids = p => p.childrenList;
const hasKidAged = (p,lo,hi) => kids(p).some(k=>k.age>=lo && k.age<=hi);

/* ================= 渲染 ================= */
function buildBoard(){
  const b = $('#board'); b.innerHTML='';
  CELLS.forEach((t,i)=>{
    const c = CT[t];
    const d = document.createElement('div');
    d.className='cell'; d.id='cell'+i;
    d.style.borderTopColor = c.c;
    d.innerHTML = `<div class="ico">${c.ico}</div><div class="nm">${c.nm}</div><div class="tokens" id="tk${i}"></div>`;
    const [r,col] = gridPos(i);
    d.style.gridRow=r; d.style.gridColumn=col;
    b.appendChild(d);
  });
}
function renderTokens(){
  for(let i=0;i<36;i++) $('#tk'+i).innerHTML='';
  G.players.forEach(p=>{
    if(p.out) return;
    const t = document.createElement('div');
    t.className='token'; t.style.background=TOKEN_COLORS[p.idx];
    t.style.setProperty('--tc', TOKEN_COLORS[p.idx]);   /* 每位玩家的位置用自己的颜色发光 */
    if(p.idx===G.turn && !G.over) t.classList.add('cur');   /* 轮到谁，谁在闪 */
    t.textContent = TOKEN_ICONS[p.idx];
    $('#tk'+p.pos).appendChild(t);
  });
}
function lifestyleExtra(p){
  /* 家庭工资性收入超过48万的部分，会带来15%的「改善型消费」 */
  const wage = (p.retired||p.unemployed>0||p.mainQuit?0:p.salary*p.salaryF) + (p.divorced?0:p.spouse*p.salaryF);
  return Math.round(0.15*Math.max(0, wage-48)*10)/10;
}
function living(p){
  const dep = kids(p).filter(k=>!k.grown).length;
  return (p.livingBase + lifestyleExtra(p)) * G.infl * (1 + 0.15*Math.max(0,dep-1));
}
function passiveIncome(p){
  const rents = p.props.reduce((s,pr)=>s+pr.rent,0);
  return Math.max(0, rents + p.low*10*LOW_RATE*G.rateF + p.trust*10*TRUST_RATE*G.rateF
    + p.p2p*10*P2P_RATE*G.rateF + p.blue*G.price.fund*0.04/10000);
}
function stockValue(p){ return Math.max(0, p.blue*G.price.fund/10000 + p.gem*G.price.gem/10000); }
/* 市场价格是「活」的：每次有人看盘/交易/急售都会先波动一下；每年再来一次大级别波动。
   红利基金：温和（约八成时间向上）；创业板：暴烈（约六成时间向上）。 */
function driftPrices(kind){
  const fp = kind==='year' ? {up:0.8, mag:0.13} : {up:0.65, mag:0.06};
  const gp = kind==='year' ? {up:0.6, mag:0.38} : {up:0.55, mag:0.16};
  const f = (Math.random()<fp.up ? 1 : -1) * Math.random()*fp.mag;
  const g = (Math.random()<gp.up ? 1 : -1) * Math.random()*gp.mag;
  G.price.fund = Math.max(1, Math.round(G.price.fund*(1+f)*100)/100);
  G.price.gem  = Math.max(0.5, Math.round(G.price.gem*(1+g)*100)/100);
}
const ytd = k => G.price[k]/G.snap[k] - 1;   /* 今年以来涨跌 */
const pctTxt = v => (v>=0?'+':'') + Math.round(v*1000)/10 + '%';
function netWorth(p){
  let v = p.cash + p.savings + (p.low+p.trust+p.p2p)*10 + p.pe.reduce((s,x)=>s+x.amt,0)
        + stockValue(p) + p.bizUnits*5 + p.saveIns.reduce((s,x)=>s+x.value,0);
  p.props.forEach(pr=>{ v += propPrice(pr.type) - pr.loan; });
  return v;
}
function goals(p){
  const exp = Math.max(1,p.lastExpense);
  const freedom = passiveIncome(p)/exp;
  const retire = (passiveIncome(p) + p.savings/20 + p.saveIns.filter(x=>x.owner==='self').reduce((s,x)=>s+x.value,0)/20) / Math.max(1,living(p)*0.7*G.retireF);
  const risk = ((p.insCrit?p.insCrit.sum:0) + (p.lifeIns?p.lifeIns.sum*0.3:0))/100;
  return {freedom, retire, risk};
}
function renderOverview(){
  const box = $('#ovBox'); if(!box) return;
  box.innerHTML = '';
  G.players.forEach(p=>{
    const d = document.createElement('div');
    d.className = 'ovcard' + (p.idx===G.turn && !p.out && !p.done ? ' active':'');
    d.style.borderLeftColor = TOKEN_COLORS[p.idx];
    const g = goals(p);
    const st = p.out ? (p.dead?'⚰️ 人生定格':'💥 已破产') : p.done ? '🏁 已到站' : (p.retired?'🌇 已退休':'');
    let assets = [];
    if(p.props.length){
      const h=p.props.filter(x=>x.type==='house').length, sc=p.props.filter(x=>x.type==='school').length, s=p.props.filter(x=>x.type==='shop').length;
      assets.push(`🏠×${h}${sc?` 🏫学区×${sc}`:''} 🏬×${s}`);
    }
    if(p.blue||p.gem){
      const mv = stockValue(p), cost = p.blueCost+p.gemCost;
      const pl = mv-cost;
      assets.push(`📈 红利基金${p.blue/100}手/创业板${p.gem/100}手 市值${fmt(mv)} <span class="${pl>=0?'pos':'neg'}">(${pl>=0?'+':''}${fmt(pl)})</span>`);
    }
    if(p.low||p.trust||p.p2p) assets.push(`🏦 低风险${fmt(p.low*10)}/中风险${fmt(p.trust*10)}/P2P ${fmt(p.p2p*10)}`);
    if(p.side) assets.push(`💻 副业第${p.side.years}年${p.side.income?`，年入${fmt(p.side.income)}`:'（未盈利）'}`);
    if(p.hasCar) assets.push(`🚗 有车${p.carLux?'（豪华款）':''}`);
    if(p.pe.length) assets.push(`🚀 创业股权${fmt(p.pe.reduce((s,x)=>s+x.amt,0))}`);
    if(p.bizUnits) assets.push(`🍜 小店${p.bizUnits}份`);
    if(p.saveIns.length) assets.push(`💰 储蓄险${fmt(p.saveIns.reduce((s,x)=>s+x.value,0))}`);
    if(p.savings>0) assets.push(`🔒 储蓄${fmt(p.savings)}`);
    const ins=[];
    if(p.insMedSelf) ins.push('医疗'); if(p.insMedParents) ins.push('父母医');
    if(p.insMedKids) ins.push('孩子医'); if(p.insCrit) ins.push(`重疾${p.insCrit.sum}`);
    if(p.insCritKids) ins.push('孩子重疾'); if(p.lifeIns) ins.push(`寿险${p.lifeIns.sum}`);
    if(p.insProp) ins.push('财产');
    assets.push(`🛡️ ${ins.length?ins.join('/') : '<span class="neg">无保险</span>'}`);
    const kidsTxt = kids(p).length? kids(p).map(k=>`${k.age}岁`).join('、'):'无';
    d.innerHTML = `
      <div class="ovname" style="color:${TOKEN_COLORS[p.idx]}">${TOKEN_ICONS[p.idx]} ${p.gender==='f'?'👩':'👨'}${p.name} <span style="font-weight:400;font-size:12px;color:var(--ink-soft)">${p.age}岁 ${st}</span></div>
      <div class="ovrow"><span>💰现金 <b class="money">${fmt(p.cash)}</b></span><span>🏆净资产 <b class="money">${fmt(netWorth(p))}</b></span><span>🪷功德 <b>${p.happiness}</b></span></div>
      <div class="ovrow"><span>👶孩子：${kidsTxt}</span><span>💑配偶年入：${p.divorced?'—':fmt(p.spouse*p.salaryF)}</span>${p.regret==='have'?'<span>💊后悔药</span>':''}</div>
      <div class="ovassets">${assets.join('<br>')}</div>
      <div class="goalbars">
        ${goalBarHTML('🕊️ 财务自由度', g.freedom)}
        ${goalBarHTML('🌅 退休覆盖度', g.retire)}
        ${goalBarHTML('🛡️ 风险覆盖度', g.risk)}</div>
    `;
    box.appendChild(d);
  });
}
function goalBarHTML(label, v){
  const shown = Math.max(0, Math.round(v*100));
  const pct = Math.min(100, shown);
  return `<div class="goalbar">${label} <span class="num">${shown}%</span>
    <div class="bar"><div class="fill ${v>=1?'done':''}" style="width:${pct}%"></div></div></div>`;
}
function renderCenter(msg){
  const p = G.players[G.turn]; if(!p) return;
  $('#cWho').innerHTML = `轮到 <b>${p.name}</b>`;
  $('#cYear').textContent = `${p.age}岁 · 第 ${p.year+1} 年 / 共 ${G.maxYears} 年`;
  $('#cCash').textContent = `现金 ${fmt(p.cash)}`;
  $('#cHint').textContent = msg||'';
}
function renderAll(){ renderOverview(); renderCenter(); renderLog(); if(document.getElementById('tk0')) renderTokens(); }
/* 功德值上涨的醒目提示 */
function gainHappy(p, n){
  p.happiness += n;
  if(n>0){
    const t=document.createElement('div'); t.className='happytoast';
    t.textContent = `🪷 ${p.name} 功德 +${n}`;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2000);
  }
}
/* ===== 大事记：按玩家分开显示（页签切换，默认跟随当前玩家） ===== */
let logFilter = 'auto';
function renderLogTabs(){
  const holder = $('#logTabs'); if(!holder) return;
  if(G.players.length<2){ holder.innerHTML=''; return; }
  holder.innerHTML = `<button data-f="auto" class="${logFilter==='auto'?'on':''}" ${logFilter==='auto'?`style="background:${TOKEN_COLORS[G.turn]}"`:''}>跟随当前（${G.players[G.turn]?G.players[G.turn].name:''}）</button>` +
    G.players.map(p=>`<button data-f="${p.idx}" class="${logFilter===p.idx?'on':''}" ${logFilter===p.idx?`style="background:${TOKEN_COLORS[p.idx]}"`:''}>${p.name}</button>`).join('');
  holder.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    logFilter = b.dataset.f==='auto'?'auto':+b.dataset.f;
    renderLog();
  });
}
function renderLog(){
  renderLogTabs();
  const idx = logFilter==='auto' ? G.turn : logFilter;
  const p = G.players[idx]; if(!p) return;
  $('#logBox').innerHTML = [...p.events].reverse().map(e=>
    `<div><span class="yr">[${e.age}岁]</span> <span class="${e.major?'major':''}">${e.icon} ${e.text}</span></div>`).join('')
    || '<div style="color:var(--ink-soft)">这一年还风平浪静。</div>';
}
function log(p, text, major=false, icon=''){
  p.events.push({year:p.year+1, age:p.age, text, major, icon});
  renderLog();
}
/* ================= 掷骰子（弹窗内动画 + 后悔药） ================= */
async function rollDice(p, n, title, ruleHtml){
  let d1,d2;
  const roll = ()=>{ d1=die(); d2 = n===2?die():0; };
  roll();
  while(true){
    const vals = n===2?[d1,d2]:[d1];
    const sum = n===2 ? d1+d2 : d1;
    const btns = [{label:'确定', value:'ok'}];
    if(p.regret==='have') btns.unshift({label:'💊 用后悔药重掷', value:'re', cls:'btn-plain'});
    const r = await modal({title, icon:'🎲', klass:'k-ink',
      html:`${ruleHtml||''}<div class="dicetray" id="mdice" style="margin:12px 0"></div><div id="mnum" style="text-align:center;font-weight:800;font-size:20px;visibility:hidden">点数：${sum}</div>`,
      buttons:btns,
      onopen: kd=>{ animateDice(kd.querySelector('#mdice'), vals, false).then(()=>{ const n=kd.querySelector('#mnum'); if(n) n.style.visibility='visible'; }); }});
    if(r==='re'){
      p.regret='used'; p.flags.regretUsed=true;
      log(p,'服下了千金难买的后悔药，命运重掷一次！',true,'💊');
      roll(); continue;
    }
    return {d1,d2,sum};
  }
}

/* ================= 现金不足 → 变卖资产 ================= */
async function ensureCash(p, need, reason){
  driftPrices('visit');   /* 急售时，市场价格也在动 */
  while(p.cash < need - 1e-9){
    const gap = need - p.cash;
    const opts = [];
    if(p.low>0) opts.push({k:'low', label:`赎回低风险理财10万（全额到账10万）`});
    if(p.trust>0) opts.push({k:'trust', label:`赎回中风险理财10万（全额到账10万）`});
    if(p.p2p>0) opts.push({k:'p2p', label:`提前退出P2P 10万（急赎8折，得8万）`});
    if(p.blue>=100) opts.push({k:'blue', label:`急售红利基金${Math.min(p.blue,10000)/100}手（此刻市价${G.price.fund}元，得 ${fmt(Math.min(p.blue,10000)*G.price.fund/10000)}）`});
    if(p.gem>=100) opts.push({k:'gem', label:`急售创业板${Math.min(p.gem,10000)/100}手（此刻市价${G.price.gem}元，得 ${fmt(Math.min(p.gem,10000)*G.price.gem/10000)}）`});
    p.props.forEach((pr,i)=>{
      const v = propPrice(pr.type);
      let net = v - pr.loan;
      if(pr.type==='shop') net -= Math.max(0,(v-pr.buyPrice))*0.5;
      opts.push({k:'prop'+i, label:`急售${PROP_CONF[pr.type].nm}一套（九折急售，净得约 ${fmt(net*0.9)}）`});
    });
    if(p.pe.length) opts.push({k:'pe', label:`折价转让一笔创业股权（本金五折，得 ${fmt(p.pe[0].amt*0.5)}）`});
    if(p.bizUnits>0) opts.push({k:'biz', label:`转让小店1份（收回2.4万）`});
    p.saveIns.forEach((si,i)=>{

      p.out=true; p.flags.bankrupt=true;

      return false;
    }
    const html = `<div class="desc">需支付 <b class="neg">${fmt(need)}</b>（${reason}），现金只有 <b>${fmt(p.cash)}</b>，缺口 <b class="neg">${fmt(gap)}</b>。请变卖资产：</div>`
      + opts.map(o=>`<div style="margin:6px 0"><button class="btn-plain btn-sm" data-k="${o.k}">${o.label}</button></div>`).join('');
    const pick = await new Promise(res=>{

      kd.querySelectorAll('button[data-k]').forEach(b=>b.onclick=()=>{ov.remove();res(b.dataset.k);});
      ov.appendChild(kd); $('#modalRoot').appendChild(ov);

/* 统一的变卖执行：rate=折扣（0.8=八折急售）。理财产品随时可100%赎回 */
function applySale(p, pick, rate){
  if(pick==='trust'){ p.trust--; p.cash+=10; log(p,`赎回理财产品10万（全额到账）。`); }
  else if(pick==='p2p'){ p.p2p--; p.cash+=10*rate; log(p,`被迫${rate<1?'八折':''}提前退出P2P 10万。`); }
  else if(pick==='low'){ p.low--; p.cash+=10; log(p,`赎回低风险理财10万（全额到账）。`); }
  else if(pick==='blue'){
    const sh=Math.min(p.blue,10000); const c=p.blueCost*(sh/p.blue);
    p.blue-=sh; p.blueCost=Math.max(0,p.blueCost-c);
    p.cash+=sh*G.price.fund/10000; log(p,`以市价${G.price.fund}元急售红利基金${sh/100}手。`);
  }
  else if(pick==='gem'){
    const sh=Math.min(p.gem,10000); const c=p.gemCost*(sh/p.gem);
    p.gem-=sh; p.gemCost=Math.max(0,p.gemCost-c);
    p.cash+=sh*G.price.gem/10000; log(p,`以市价${G.price.gem}元急售创业板${sh/100}手。`);
  }
  else if(pick==='pe'){ const x=p.pe.shift(); p.cash+=x.amt*0.5; log(p,`折价转让创业股权，${fmt(x.amt)}只收回一半。`,true); }
  else if(pick==='biz'){ p.bizUnits--; p.cash+=2.4; log(p,'含泪转让了一份小生意。'); }
  else if(pick==='sav'){ const use=p.savings; p.savings=0; p.cash+=use; p.flags.usedSavings=true; log(p,`动用了强制储蓄 ${fmt(use)}——最后的防线。`,true,'⚠️'); }
  else if(pick.startsWith('sins')){
    const i=+pick.slice(4); const si=p.saveIns[i];
    const back = si.years>=15? si.value : si.value*0.8;
    p.saveIns.splice(i,1); p.cash+=back;
    log(p, si.years>=15?`领取到期储蓄险 ${fmt(back)}。`:`提前退保储蓄险，损失20%现金价值，取回 ${fmt(back)}。`, true, '💰');
  }
  else if(pick.startsWith('prop')){
    const i=+pick.slice(4); const pr=p.props[i]; const v=propPrice(pr.type);
    let net=v-pr.loan; if(pr.type==='shop') net-=Math.max(0,(v-pr.buyPrice))*0.5;
    net*=0.9; p.props.splice(i,1); p.cash+=net;
    log(p,`九折急售${PROP_CONF[pr.type].nm}，净回 ${fmt(net)}。`,true);
  }
}
let LEDGER_SKIP=false;
async function pay(p, amt, reason){
  if(amt<=0) return true;
  const ok = await ensureCash(p, amt, reason);
  if(!ok) return false;
  p.cash -= amt;
  if(!LEDGER_SKIP) p.ledger.push({label:reason, amt:-amt});
  renderAll();
  return true;
}
/* 现金收入统一入口：立即到账并记入年度台账 */
function gain(p, amt, label){
  p.cash += amt;
  p.ledger.push({label, amt});
}
/* 凑首付：主动八折变现（买房资金不足时用） */
async function raiseFunds(p, target, reason){
  driftPrices('visit');
  while(p.cash < target - 1e-9){
    const opts=[];
    if(p.low>0) opts.push({k:'low', label:`赎回低风险理财10万 → 全额得10万`});
    if(p.trust>0) opts.push({k:'trust', label:`赎回中风险理财10万 → 全额得10万`});
    if(p.p2p>0) opts.push({k:'p2p', label:`提前退出P2P 10万 → 得8万（8折）`});
    if(p.blue>=100) opts.push({k:'blue', label:`卖红利基金${Math.min(p.blue,10000)/100}手 → 得 ${fmt(Math.min(p.blue,10000)*G.price.fund/10000)}（此刻市价${G.price.fund}元）`});
    if(p.gem>=100) opts.push({k:'gem', label:`卖创业板${Math.min(p.gem,10000)/100}手 → 得 ${fmt(Math.min(p.gem,10000)*G.price.gem/10000)}（此刻市价${G.price.gem}元）`});
    if(p.bizUnits>0) opts.push({k:'biz', label:`转店1份 → 得2.4万（8折）`});
    if(!opts.length){ await info('凑不齐了','可变现的资产已经用完。'); return p.cash>=target; }
    const html = `<div class="desc">目标 <b>${fmt(target)}</b>（${reason}），现金 <b>${fmt(p.cash)}</b>。理财可全额赎回，其余急售要打八折——流动性是有价格的：</div>`
      + opts.map(o=>`<div style="margin:6px 0"><button class="btn-plain btn-sm" data-k="${o.k}">${o.label}</button></div>`).join('');
    const pick = await new Promise(res=>{
      const ov=document.createElement('div'); ov.className='overlay';
      const kd=document.createElement('div'); kd.className='card k-gold';
      kd.innerHTML=`<div class="head">💱 凑一笔钱</div><div class="body">${html}</div><div class="foot"><button class="btn-plain" id="stopRaise">不凑了</button></div>`;
      kd.querySelectorAll('button[data-k]').forEach(b=>b.onclick=()=>{ov.remove();res(b.dataset.k);});
      kd.querySelector('#stopRaise').onclick=()=>{ov.remove();res(null);};
      ov.appendChild(kd); $('#modalRoot').appendChild(ov);
    });
    if(!pick) return p.cash>=target;
    applySale(p, pick, 0.8);
    renderAll();
  }
  return true;
}

  else { html+=`<tr><td>医疗费（当期现金）</td><td class="neg">-${fmt(medBill)}</td></tr>`; }
  const medYr = Math.round(living(p)*0.05*n*10)/10;
  if(p.insMedSelf){ html+=`<tr><td>未来年医疗支出</td><td class="pos">医疗险豁免 ✓</td></tr>`; }
  else { p.medicalExtra += medYr; html+=`<tr><td>未来每年医疗支出</td><td class="neg">+${fmt(medYr)}/年</td></tr>`; }
  p.salaryF *= (1-0.05*n);
  html += `<tr><td>家庭收入下降</td><td class="neg">-${5*n}%</td></tr>`;
  let claim=0;
  if(p.insCrit){ claim=p.insCrit.sum; html+=`<tr><td>💚 重疾险理赔</td><td class="pos">+${fmt(claim)}</td></tr>`; p.flags.critClaim=claim; }
  else { html+=`<tr><td>重疾险</td><td class="neg">未投保，无理赔</td></tr>`; p.flags.noCritWhenIll=true; }
  html+=`</table><div class="tip"><b>真实案例</b>：一位患肝癌的中年人，医疗费50万，5年少赚120万、多花60万，总代价230万——而他没有买保险。中年罹患重疾，足以击穿一个家庭。</div><div class="tip">⚠️ 从今往后，你将<b>无法再新投保医疗险</b>——保险，永远是健康的时候才买得到。</div>`;
  await info(title+`（点数 ${n}）`, html, '', '🏥', '继续人生');
  if(claim){ gain(p, claim, '重疾险理赔'); p.insCrit=null; log(p,`重疾险雪中送炭，理赔 ${fmt(claim)}！`,true,'💚'); }
  if(!p.insMedSelf){ if(!await pay(p, medBill, '重疾医疗费')) return; }
  if(p.bizUnits) p.bizPenalty=1;
  p.illness=true; p.oneDie=true;
  log(p, `${overwork?'积劳成疾，':''}罹患重大疾病（点数${n}），收入下降${5*n}%，此后每回合只能掷一粒骰子，且不能再投保医疗险。`, true, '🏥');
  renderAll();
}

    p.childrenList = p.childrenList.filter(k=>k.grown || k===keepKid);

    'k-ink','💔','向前看');
  log(p,'经历离婚，可分割财产减半。'+(kidSins.length?'孩子的储蓄险得以完整保留。':''),true,'💔');
  renderAll();
}

async function drawExpense(p){
  /* 链式待办卡（如买车→换车）优先触发 */
  const pi = p.pendingCards.findIndex(x=>x.due<=p.year);
  if(pi>=0){
    const pc = p.pendingCards.splice(pi,1)[0];
    if(CHAIN_CARDS[pc.id]){ await CHAIN_CARDS[pc.id].run(p); return; }
  }
  for(let tries=0; tries<60; tries++){
    if(!G.expDeck.length) G.expDeck = shuffle(makeExpenseDeck().slice());
    const c = G.expDeck.pop();
    if(c.req && !c.req(p)) continue;
    if(c.rare && Math.random()<0.5) continue;   /* 稀有卡二次过筛，降低出现频率 */
    if(c.big){ await c.run(p); return; }
    if(c.d) await info('🧾 '+c.t, `<div class="desc">${c.d}</div>`, '', '', '翻开卡片');
    await c.run(p);
    return;
  }
}

/* ================= 银行结算 ================= */
async function bankSettlement(p){
  /* 0. 每个游戏年度：一次大级别波动 + 年度行情播报（对比上年收盘） */
  if(p.year >= G.marketYear){
    G.marketYear = p.year + 1;
    driftPrices('year');
    G.chg = {fund: ytd('fund'), gem: ytd('gem')};
    G.snap = {...G.price};
  }
  {
    const mv = stockValue(p), cost = p.blueCost + p.gemCost, pl = mv - cost;
    await info(`📊 第${p.year+1}年 · 年度行情`,
      `<table class="stmt">
       <tr><td>🔵 红利基金</td><td>${G.price.fund}元 <span class="${G.chg.fund>=0?'pos':'neg'}">全年${pctTxt(G.chg.fund)}</span></td></tr>
       <tr><td>🚀 创业板</td><td>${G.price.gem}元 <span class="${G.chg.gem>=0?'pos':'neg'}">全年${pctTxt(G.chg.gem)}</span></td></tr>
       ${(p.blue||p.gem)?`<tr class="sum"><td>你的持仓市值</td><td class="${pl>=0?'pos':'neg'}">${fmt(mv)}（${pl>=0?'盈':'亏'}${fmt(Math.abs(pl))}）</td></tr>`:''}
      </table>${(p.blue||p.gem)?'':'<div class="tip">你还没有持仓——涨跌都与你无关，但通胀与你有关。</div>'}`,
      'k-ink','📊','知道了');
  }

  /* 1. 理财产品兑付：低风险稳拿，中风险 1/3 概率颗粒无收 */
  p._lowIncome = p.low>0 ? Math.round(p.low*10*LOW_RATE*G.rateF*100)/100 : 0;
  if(p.trust>0){
    const y = Math.round(p.trust*10*TRUST_RATE*G.rateF*100)/100;
    const r = await rollDice(p,1,'中风险理财到期兑付',`<div class="rule">中风险理财（年化${Math.round(TRUST_RATE*G.rateF*1000)/10}%）：1、2点=当年收益为0（约1/3概率）；3-6点=按约兑付。</div>`);
    if(r.sum<=2){ await info('中风险理财','市场波动，产品净值回撤，今年收益为0（本金仍在）。<div class="tip">「中风险」的意思是：多数年份还行，个别年份颗粒无收。</div>','k-gold','🏦'); p.flags.trustDelay=true; p._trustIncome=0; }
    else p._trustIncome = y;
  } else p._trustIncome=0;
  if(p.p2p>0){
    const r = await rollDice(p,1,'P2P产品到期兑付',`<div class="rule">高收益固收（年化${Math.round(P2P_RATE*G.rateF*1000)/10}%）：1点=平台跑路，本金全损！2-6点=按约兑付本息。</div>`);
    if(r.sum===1){
      const lost=p.p2p*10;
      await info('P2P 爆雷！',`债务人跑路，${fmt(lost)} 本金和收益血本无归。<div class="tip">高收益背后，是本金归零的风险。收益率超过8%就要打问号，超过10%就要做好损失全部本金的准备。</div>`,'','💣');
      log(p,`P2P爆雷，${fmt(lost)}本金全损！`,true,'💣');
      p.flags.p2pLost=(p.flags.p2pLost||0)+lost; p.p2p=0; p._p2pIncome=0;
    } else p._p2pIncome = Math.round(p.p2p*10*P2P_RATE*G.rateF*100)/100;
  } else p._p2pIncome=0;

  /* 2. 创业股权掷骰 */
  for(let i=p.pe.length-1;i>=0;i--){
    const inv=p.pe[i];
    const r = await rollDice(p,1,`创业股权（${fmt(inv.amt)}）年度进展`,
      '<div class="rule">1=创业失败本金全损；2=需追加50%现金；3=需追加100%现金；4=无变化；5=2倍退出；6=4倍退出。</div>');
    if(r.sum===1){ await info('创业股权','创业九死一生，这一笔投资失败，本金全部损失。','','🚀'); p.flags.peLost=(p.flags.peLost||0)+inv.amt; log(p,`创业股权${fmt(inv.amt)}投资失败。`,true,'🚀'); p.pe.splice(i,1); }
    else if(r.sum===2 || r.sum===3){
      const need = inv.amt*(r.sum===2?0.5:1);
      const c = await modal({title:'企业需要烧钱', icon:'🚀', html:`<div class="desc">被投企业资金告急，需追加 <b class="neg">${fmt(need)}</b>，否则股权清零退出。</div>`,
        buttons:[{label:'放弃（本金清零）',value:false,cls:'btn-plain'},{label:`追加 ${fmt(need)}`,value:true}]});
      if(c && await pay(p,need,'追加投资')){ inv.amt+=need; log(p,`为创业项目追加投资 ${fmt(need)}。`,true,'🚀'); }
      else { p.flags.peLost=(p.flags.peLost||0)+inv.amt; log(p,`不再烧钱，创业股权${fmt(inv.amt)}清零。`,true,'🚀'); p.pe.splice(i,1); }
    }
    else if(r.sum>=5){
      const mult=r.sum===5?2:4; const back=inv.amt*mult;
      await info('高光时刻！',`被投企业成功退出，收回现金 <b class="pos">${fmt(back)}</b>（${mult}倍回报）！`,'','🎉');
      gain(p, back, `创业股权${mult}倍退出`); p.flags.peWin=(p.flags.peWin||0)+back; log(p,`创业股权${mult}倍退出，落袋 ${fmt(back)}！`,true,'🎉'); p.pe.splice(i,1);
    }
  }

  /* 3. 小微企业年度经营掷骰 */
  let bizIncome = 0, bizNote='';
  if(p.bizUnits>0){
    const r = await rollDice(p,1,'小微企业年度经营',
      '<div class="rule">每份10万投资：1=经营不善，全部倒闭！2=每份亏1万；3=保本；4=每份赚1.5万；5=每份赚2.5万；6=生意火爆，每份赚4万。</div>');
    if(r.sum===1){
      await info('小店倒闭了',`大环境叠加选址失误，${p.bizUnits}份小生意全部关张，投入打了水漂（贷款已用残值清偿）。<div class="tip">小生意的阵亡率远比想象中高——亲力亲为也不是护身符。</div>`,'','🍜');
      log(p,`小微企业倒闭，${p.bizUnits}份投入化为乌有。`,true,'🍜');
      p.flags.bizFail=true; p.bizUnits=0;
    } else {
      const per = {2:-1, 3:0, 4:1.5, 5:2.5, 6:4}[r.sum];
      bizIncome = per*p.bizUnits*(p.bizPenalty?0.5:1);
      bizNote = `（每份${per>=0?'+':''}${per}万${p.bizPenalty?'，重疾影响减半':''}）`;
    }
  }

  /* 3.5 副业经营 */
  let sideNote='';
  if(p.side){
    p.side.years++;
    if(p.side.years<=3){ p.side.income=0; sideNote=`（第${p.side.years}年，仍在积累期）`; }
    else if(p.side.income===0){
      const d=die();
      p.side.income = d<=2 ? 0 : (d-2)*5;
      sideNote = p.side.income>0 ? '（终于开始赚钱了！）' : '（还没赚到钱，再熬熬）';
      if(p.side.income>0) log(p,`副业首次盈利，年入 ${fmt(p.side.income)}！`,true,'💻');
    } else {
      const mult={1:0.3,2:0.6,3:1,4:1.5,5:2,6:3}[die()];
      p.side.income = Math.round(p.side.income*mult*10)/10;
      sideNote = mult>=1.5?'（爆发增长！）':mult<1?'（流量下滑…）':'';
    }
  }

  /* 4. 年度现金流 */
  let salaryEff = (p.retired||p.unemployed>0||p.mainQuit) ? 0 : p.salary*p.salaryF;
  const spouseEff = (p.divorced||p.retired) ? 0 : Math.round(p.spouse*p.salaryF*10)/10;
  let distractNote='';
  if(salaryEff>0 && p.bizUnits>=3){ salaryEff*=0.6; distractNote='（经营小店分心，-40%）'; }
  if(salaryEff>0 && p.side){ salaryEff*=0.9; distractNote+='（副业分心-10%）'; }
  if(salaryEff>0 && p.maternity>0){ salaryEff*=0.7; distractNote+='（产假，-30%）'; p.maternity--; }
  const rents = p.props.reduce((s,pr)=>s+pr.rent,0);
  const div = Math.round(p.blue*G.price.fund*0.04/10000*100)/100;
  let extraIn = 0, extraRows='';
  p.pendingIncome.forEach(x=>{ extraIn+=x.amt; extraRows+=`<tr><td>${x.label}</td><td class="pos">+${fmt(x.amt)}</td></tr>`; });
  p.pendingIncome=[];
  let benefit=0;
  if(p.unemployed>0 && p.unempPaid<2){ benefit=3; p.unempPaid++; }
  const sideIncome = p.side ? p.side.income : 0;
  /* 子女：啃老的要补贴，有出息的会孝敬 */
  const neetCost = kids(p).filter(k=>k.neet).length * 3;
  const starIncome = kids(p).filter(k=>k.star).length * 2;
  const income = salaryEff + spouseEff + bizIncome + sideIncome + rents + div + p._lowIncome + p._trustIncome + p._p2pIncome + extraIn + benefit + starIncome;

  let liv = living(p), livNote='';
  if(p.unemployed>0){ liv*=0.9; livNote='（失业期节衣缩食，但房贷学费一分不少，只省得下10%）'; }
  const tuition = p.tuitionYears>0?20:0;
  const intlFee = (p.intlSchool && kids(p).some(k=>k.age>=6&&k.age<=18)) ? 15 : 0;
  const med = p.insMedSelf?0:p.medicalExtra;
  let prem = 0;
  if(p.insMedSelf) prem += 1*G.medF;
  if(p.insMedParents) prem += 1*G.medF;
  if(p.insMedKids) prem += 0.5*G.medF*kids(p).length;
  if(p.insCrit) prem += p.insCrit.premium;
  if(p.insCritKids) prem += p.insCritKids.premium;
  if(p.lifeIns) prem += p.lifeIns.premium;
  if(p.insProp) prem += p.props.reduce((s,pr)=>s+propPrice(pr.type),0)*0.001;
  const loanPay = (p.props.reduce((s,pr)=>s+pr.pay,0) + p.bizUnits*0.5)*G.rateF;
  const expense = liv + tuition + intlFee + med + prem + loanPay + neetCost;
  p.lastExpense = expense;
  let net = income - expense;

  const row=(k,v,neg)=>`<tr><td>${k}</td><td class="${neg?'neg':'pos'}">${neg?'-':'+'}${fmt(Math.abs(v))}</td></tr>`;
  let html = '';
  if(p.ledger.length){
    html += `<div style="font-weight:700;font-size:13.5px;margin-bottom:2px">📒 年内已发生的大额收支（已实时入账，不重复计算）</div><table class="stmt" style="margin-bottom:10px">`
      + p.ledger.map(e=>`<tr><td>${e.label}</td><td class="${e.amt>=0?'pos':'neg'}">${e.amt>=0?'+':'-'}${fmt(Math.abs(e.amt))}</td></tr>`).join('')
      + `</table><div style="font-weight:700;font-size:13.5px;margin-bottom:2px">📅 年度经常性现金流</div>`;
    p.ledger = [];
  }
  html += `<table class="stmt">`;
  if(p.retired) html+=`<tr><td>工资收入（已退休）</td><td>0</td></tr>`;
  else if(p.unemployed>0) html+=`<tr><td>工资收入（失业中，还剩${p.unemployed}年）</td><td class="neg">0</td></tr>`;
  else html+=row(`工资收入${distractNote}`, salaryEff);
  if(spouseEff) html+=row('配偶收入', spouseEff);
  if(starIncome) html+=row('出息孩子的孝敬', starIncome);
  if(p.bizUnits) html+=row(`小微企业经营${bizNote}`, bizIncome, bizIncome<0);
  if(p.side) html+=row(`副业收入${sideNote}`, sideIncome);
  if(rents) html+=row('房租收入', rents);
  if(div) html+=row(`红利基金分红（4%股息率）`, div);
  if(p._lowIncome) html+=row('低风险理财收益（稳）', p._lowIncome);
  if(p._trustIncome) html+=row('理财产品收益', p._trustIncome);
  if(p._p2pIncome) html+=row('P2P收益', p._p2pIncome);
  if(benefit) html+=row('失业保险金', benefit);
  html+=extraRows;
  html+=row('一般生活开支'+livNote+(lifestyleExtra(p)>0?`（含收入水涨船高的改善型消费${fmt(lifestyleExtra(p)*G.infl)}）`:''), liv, true);
  if(tuition) html+=row(`留学学费（还剩${p.tuitionYears}年）`, tuition, true);
  if(intlFee) html+=row('国际学校学费', intlFee, true);
  if(neetCost) html+=row(`补贴啃老的孩子（${kids(p).filter(k=>k.neet).length}个）`, neetCost, true);
  if(med) html+=row('疾病医疗支出', med, true);
  if(prem) html+=row('保险费', prem, true);
  if(loanPay) html+=row('贷款还本付息', loanPay, true);
  html+=`<tr class="sum"><td>净现金流</td><td class="${net>=0?'pos':'neg'}">${net>=0?'+':''}${fmt(net)}</td></tr></table>`;

  if(tuition && p.savings>0){
    const use = Math.min(p.savings, tuition);
    p.savings-=use; net+=use;
    html+=`<div class="tip">留学学费动用教育/强制储蓄 ${fmt(use)}，减轻了现金流压力 ✓</div>`;
  }
  await info(`🏦 经过银行 · 第${p.year+1}年结算`, html, 'k-gold', '', net>=0?'领取现金流':'支付差额');
  if(net>=0) p.cash+=net;
  else {
    LEDGER_SKIP=true;
    const ok = await pay(p,-net,'年度现金流为负');
    LEDGER_SKIP=false;
    if(!ok) return;
    await info('💸 差额已结清', `年度现金流为负，已${p.flags.forcedSale?'变卖资产并':''}支付差额 ${fmt(-net)}。<br>当前现金：<b>${fmt(p.cash)}</b>`, 'k-gold', '', '继续');
  }

  /* 5. 储蓄计划 & 储蓄险复利 & 家庭年龄推进 */
  for(const plan of p.plans){
    if(plan.yearsLeft<=0) continue;
    const amt = plan.fix ? plan.fix : Math.max(0, net)*plan.pct;
    if(amt>0 && p.cash>=amt){ p.cash-=amt; p.savings+=amt; plan.yearsLeft--; log(p,`「${plan.label}」计划存入 ${fmt(amt)}（还剩${plan.yearsLeft}年）。`); }
    else if(amt>0){ log(p,`现金不足，「${plan.label}」本年暂停缴存。`); }
    if(plan.yearsLeft===0) p.flags.planDone=true;
  }
  p.plans = p.plans.filter(x=>x.yearsLeft>0);
  p.saveIns.forEach(si=>{ si.value = Math.round(si.value*1.045*100)/100; si.years++; });
  kids(p).forEach(k=>k.age++);

  /* 孩子23岁：毕业进社会——教育给起点，运气定终点 */
  for(const k of kids(p)){
    if(k.age>=23 && !k.grown){
      k.grown = true;
      const eduBonus = Math.min(2, (p.flags.schoolHouse||p.flags.paidSchoolFee?1:0) + (p.flags.studyAbroad?1:0) + (p.flags.intlSchool?1:0));
      const eduDesc = [];
      if(p.flags.schoolHouse) eduDesc.push('学区房');
      if(p.flags.paidSchoolFee) eduDesc.push('择校');
      if(p.flags.intlSchool) eduDesc.push('国际学校');
      if(p.flags.studyAbroad) eduDesc.push('海外留学');
      const r = await rollDice(p,1,`${k.age}岁的孩子毕业了`,
        `<div class="rule">教育背景（${eduDesc.length?eduDesc.join('+'):'普通公立'}）加成 +${eduBonus}；掷骰定前程：合计≤3 啃老在家（每年补贴3万）；4-6 自食其力；≥7 有出息（每年孝敬2万）。</div><div class="tip">${p.flags.intlSchool&&!p.flags.studyAbroad?'国际学校读完最终没出国——这条路的沉没成本，比想象中高。':'房子和学费买得来起点，买不来终点。'}</div>`);
      const total = r.sum + eduBonus;
      if(total<=3){
        k.neet=true; p.flags.kidNeet=true;
        await info('毕业即失业','孩子投了三百份简历，最后回了家：「爸妈，我再想想。」从此家里多了一份「啃老补贴」：3万/年。<div class="tip">教育是概率游戏，不是确定性交易——所以家庭财务永远要留有余量。</div>','','🎓');
        log(p,'孩子毕业后没找到工作，暂时啃老（+3万/年补贴）。',true,'🎓');
      } else if(total>=7){
        k.star=true; p.flags.kidStar=true;
        await info('孩子有出息了',`孩子进了心仪的公司，第一个月工资就给你转了红包。从此每年孝敬 <b class="pos">2万</b>。${eduDesc.length?'当年的教育投入，在今天开花了。':'没花什么择校钱，孩子照样争气——运气和努力，比学区房贵。'}`,'','🎓');
        gainHappy(p,2);
        log(p,'孩子毕业后大有出息，每年孝敬2万！',true,'🎓');
      } else {
        await info('孩子独立了','孩子找到了一份普通但踏实的工作，搬了出去，开始自己交房租。家里安静了，也轻松了。','','🎓');
        gainHappy(p,1);
        log(p,'孩子毕业独立，开始自食其力。',true,'🎓');
      }
      renderAll();
    }
  }
  /* 啃老的孩子每年有机会翻身 */
  for(const k of kids(p)){
    if(k.neet && die()>=5){ k.neet=false; gainHappy(p,1); log(p,'啃老的孩子终于找到了工作，搬出去了！',true,'🎓'); }
  }

  if(p.side && !p.mainQuit && !p.retired && p.unemployed===0 && p.side.income>0 && salaryEff>0 && p.side.income>=salaryEff){
    const q = await modal({title:'💻 副业超过了主业', icon:'', klass:'k-gold', html:
      `<div class="desc">今年副业赚了 <b class="pos">${fmt(p.side.income)}</b>，已经${p.side.income>salaryEff?'超过':'追平'}主业工资 ${fmt(salaryEff)}。要不要辞职，全职做自己的事业？</div>
       <div class="tip">辞职后没有工资、没有裁员补偿，副业收入依然随运气波动——但时间完全属于你。</div>`,
      buttons:[{label:'再观望一年',value:false,cls:'btn-plain'},{label:'辞职！全职干',value:true}]});
    if(q){ p.mainQuit=true; p.flags.wentFreelance=true; log(p,`副业年入${fmt(p.side.income)}超过主业，毅然辞职单干！`,true,'💻'); }
  }
  if(p.unemployed>0){
    p.unemployed--;
    if(p.unemployed===0){
      if(p.age>=45){
        const q = await modal({title:'💼 45岁的求职市场', klass:'k-ink', html:
          `<div class="desc">简历投了上千份，面试官委婉地说「我们更想要有冲劲的年轻人」。${p.age}岁的你，只等到两种offer：<b>保安/网约车/仓库分拣</b>，年薪6万。</div>
           <div class="tip">45岁+的再就业市场就是这么残酷——这也是为什么中年之前就要备好资产性收入和第二曲线。</div>`,
          buttons:[{label:'不干了，靠积蓄生活',value:false,cls:'btn-plain'},{label:'接受，先干着（年薪6万）',value:true,cls:'btn-gold'}]});
        if(q){ p.salary=6; p.salaryF=1; p.flags.midlifeGrind=true; log(p,'45岁后再就业，只找到年薪6万的体力工作，先干着。',true,'💼'); }
        else { p.mainQuit=true; p.flags.midlifeQuit=true; log(p,'45岁后放弃求职，从此没有工资收入。',true,'💼'); }
      } else log(p,'终于重新找到了工作，收入恢复。','', '💼');
    }
  }
  if(p.tuitionYears>0){ p.tuitionYears--; if(p.tuitionYears===0) log(p,'孩子学成归来！','', '🎓'); }
  if(p.bizPenalty) p.bizPenalty=0;
  p.year++; p.age++;
  renderAll();

  /* 6. 银行理财室（含提前退休/储蓄险） */
  await bankProducts(p);

  if(!p.done && p.age>=G.retireAge){
    p.done=true; p.retired=true;
    await info('🌇 到龄退休', `${p.name} 到了 ${G.retireAge} 岁法定退休年龄，正式退休！人生的下半场，就看这些年攒下的家底了。请等待其他玩家到站后一起复盘。`, 'k-gold');
  }
  else if(p.year>=G.maxYears && !p.done){
    p.done=true;
    await info('🏁 旅程到站', `${p.name} 完成了 ${G.maxYears} 年的人生旅程！请等待其他玩家到站后一起复盘。`, 'k-gold');
  }
}
async function bankProducts(p){
  while(true){
    const lRate = Math.round(LOW_RATE*G.rateF*10000)/100, tRate = Math.round(TRUST_RATE*G.rateF*1000)/10, pRate = Math.round(P2P_RATE*G.rateF*1000)/10;
    const sinsTotal = p.saveIns.reduce((s,x)=>s+x.value,0);
    const html = `<div class="desc">现金 <b>${fmt(p.cash)}</b>。年末理财室（10万/份）：</div>
      <table class="stmt nw">
      <tr><td>🛌 低风险理财</td><td>年化${lRate}%，稳稳到手绝无回撤 · 持有${p.low}份</td></tr>
      <tr><td>🏦 中风险理财</td><td>年化${tRate}%，1/3概率当年收益为0 · 持有${p.trust}份</td></tr>
      <tr><td>💣 P2P（高风险）</td><td>年化${pRate}%，骰1=本金全损 · 持有${p.p2p}份</td></tr>
      <tr><td>💰 分红储蓄险</td><td>4.5%复利，锁定15年 · 现值${fmt(sinsTotal)}</td></tr></table>
      <div class="tip">低风险睡得香，但年化${lRate}%跑不过煎饼摊涨价——安全感也是有价格的。</div>
      ${p.retired?'':'<div class="tip">🌇 也可以在这里选择<b>提前退休</b>：游戏就此结束，看看这些年攒下的家底够不够安度晚年。</div>'}`;
    const btns=[];
    if(p.cash>=10) btns.push({label:'买低风险1份', value:'bl', cls:'btn-plain btn-sm'},{label:'买中风险1份', value:'bt', cls:'btn-gold btn-sm'},{label:'买P2P 1份', value:'bp', cls:'btn-gold btn-sm'},{label:'买储蓄险', value:'bs', cls:'btn-gold btn-sm'});
    if(p.low>0) btns.push({label:'赎回低风险1份', value:'sl', cls:'btn-plain btn-sm'});
    if(p.trust>0) btns.push({label:'赎回中风险1份', value:'st', cls:'btn-plain btn-sm'});
    if(p.p2p>0) btns.push({label:'赎回P2P 1份', value:'sp', cls:'btn-plain btn-sm'});
    if(p.saveIns.length) btns.push({label:'储蓄险取现/退保', value:'ss', cls:'btn-plain btn-sm'});
    if(!p.retired) btns.push({label:'🌇 提前退休', value:'retire', cls:'btn-plain btn-sm'});
    btns.push({label:'离开银行', value:'x'});
    const r = await modal({title:'🏦 银行理财室', klass:'k-gold', html, buttons:btns});
    if(r==='bl'){ p.cash-=10; p.low++; p.flags.boughtLow=(p.flags.boughtLow||0)+1; log(p,'买入低风险理财1份（10万）。'); }
    else if(r==='sl'){ p.low--; p.cash+=10; log(p,'赎回低风险理财1份。'); }
    else if(r==='bt'){ p.cash-=10; p.trust++; log(p,'买入中风险理财1份（10万）。'); }
    else if(r==='bp'){ p.cash-=10; p.p2p++; log(p,'买入P2P 1份（10万）——高收益，也高风险。'); p.flags.boughtP2P=true; }
    else if(r==='bs'){ await buySaveIns(p); }
    else if(r==='st'){ p.trust--; p.cash+=10; log(p,'赎回中风险理财1份。'); }
    else if(r==='sp'){ p.p2p--; p.cash+=10; log(p,'赎回P2P 1份。'); }
    else if(r==='ss'){ await manageSaveIns(p); }
    else if(r==='retire'){
      const pi = passiveIncome(p);
      const ok = await modal({title:'🌇 提前退休', klass:'k-gold', html:
        `<div class="desc">退休后，工资收入永久归零。当前你的年被动收入约 <b>${fmt(pi)}</b>，年支出约 <b>${fmt(p.lastExpense)}</b>。</div>
        ${pi>=p.lastExpense?'<div class="tip pos">被动收入已覆盖支出——这就是财务自由的样子。</div>':'<div class="tip"><b class="neg">警告</b>：被动收入还盖不住支出，退休后将持续消耗积蓄。</div>'}`,
        buttons:[{label:'再干几年',value:false,cls:'btn-plain'},{label:'退休！把时间还给自己',value:true}]});
      if(ok){ p.retired=true; p.done=true; p.flags.retiredEarly=true; log(p,`在${p.age}岁选择提前退休，人生进入下半场。`,true,'🌇'); renderAll(); break; }
    }
    else break;
    renderAll();
  }
}
async function buySaveIns(p){
  const forWho = kids(p).length ? await modal({title:'💰 分红储蓄险', klass:'k-gold', html:
    '<div class="desc">为谁投保？<br>· 以<b>4.5%/年复利</b>增值，满15年可取；提前退保只退现金价值的80%。<br>· <b>给孩子买的储蓄险</b>：夫妻离婚不分割；孩子将来离婚，也是TA的婚前财产。</div>',
    buttons:[{label:'取消',value:null,cls:'btn-plain'},{label:'给自己买',value:'self',cls:'btn-plain'},{label:'给孩子买',value:'child',cls:'btn-gold'}]})
    : 'self';
  if(!forWho) return;
  const maxU = Math.floor(p.cash/10);
  if(maxU<1){ await info('储蓄险','现金不足10万。'); return; }
  const q = await modal({title:'投入金额', klass:'k-gold', html:`<div class="desc">以10万为倍数，最多 ${maxU} 份：</div>
    <div class="qtyrow"><input type="number" id="qty" min="1" max="${maxU}" value="1"> × 10万</div>`,
    buttons:[{label:'取消',value:null,cls:'btn-plain'},{label:'投保',pick:kd=>{const v=parseInt(kd.querySelector('#qty').value);return (v>=1&&v<=maxU)?v:null;}}]});
  if(!q) return;
  p.cash-=q*10;
  p.saveIns.push({owner:forWho, principal:q*10, value:q*10, years:0});
  p.flags.boughtSaveIns=true;
  log(p,`${forWho==='child'?'给孩子':''}投保分红储蓄险 ${fmt(q*10)}（4.5%复利，锁定15年）。`,true,'💰');
}
async function manageSaveIns(p){
  const opts = p.saveIns.map((si,i)=>({i, label:`${si.owner==='child'?'👶孩子的':'👤自己的'}储蓄险：本金${fmt(si.principal)} 现值${fmt(si.value)}（第${si.years}年）→ ${si.years>=15?`可全额领取 ${fmt(si.value)}`:`提前退保只退 ${fmt(si.value*0.8)}`}`}));
  const html = opts.map(o=>`<div style="margin:6px 0"><button class="btn-plain btn-sm" data-i="${o.i}">${o.label}</button></div>`).join('');
  const pick = await new Promise(res=>{
    const ov=document.createElement('div'); ov.className='overlay';
    const kd=document.createElement('div'); kd.className='card k-gold';
    kd.innerHTML=`<div class="head">💰 储蓄险账户</div><div class="body">${html}</div><div class="foot"><button class="btn-plain" id="cx">返回</button></div>`;
    kd.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>{ov.remove();res(+b.dataset.i);});
    kd.querySelector('#cx').onclick=()=>{ov.remove();res(null);};
    ov.appendChild(kd); $('#modalRoot').appendChild(ov);
  });
  if(pick===null) return;
  const si = p.saveIns[pick];
  if(si.years>=15){ p.cash+=si.value; log(p,`储蓄险到期，领取 ${fmt(si.value)}（本金${fmt(si.principal)}）。复利的果实。`,true,'💰'); p.saveIns.splice(pick,1); }
  else {
    const ok = await modal({title:'提前退保？', html:`<div class="desc">锁定期未满15年，只能退现金价值的80% = <b class="neg">${fmt(si.value*0.8)}</b>，白白损失 ${fmt(si.value*0.2)}。</div>`,
      buttons:[{label:'不退了',value:false,cls:'btn-plain'},{label:'退保',value:true}]});
    if(ok){ p.cash+=si.value*0.8; log(p,`提前退保储蓄险，损失20%，取回 ${fmt(si.value*0.8)}。`,true,'💰'); p.saveIns.splice(pick,1); }
  }
}

/* ================= 保险公司 ================= */
function lifeLev(age){ return Math.max(3, Math.min(10, 10-(age-30)*7/25)); }
async function insuranceOffice(p){
  while(true){
    const critPrem = sum => Math.round(sum/(80-p.age)*G.critF*(p.gender==='f'?0.9:1)*100)/100;
    const kidCritPrem = ()=>{ const ka = Math.min(...kids(p).map(k=>k.age)); return Math.round(50/(80-ka)*G.critF*100)/100; };
    const lev = lifeLev(p.age);
    const lifePrem = Math.round(100/(lev*15)*100)/100;
    const html = `<div class="desc">现金 <b>${fmt(p.cash)}</b>。路过保险公司，可投保或退保：</div>
      <table class="stmt nw">
      <tr><td>🩺 医疗险（本人）</td><td>${fmt(1*G.medF)}/年 · ${p.insMedSelf?'<span class="pos">已投保</span>':(p.illness?'<span class="neg">患过重疾，拒保</span>':'未投保')}</td></tr>
      <tr><td>👴 医疗险（父母）</td><td>${fmt(1*G.medF)}/年 · ${p.insMedParents?'<span class="pos">已投保</span>':'未投保'}</td></tr>
      <tr><td>👶 医疗险（孩子）</td><td>${fmt(0.5*G.medF)}/孩/年 · ${p.insMedKids?'<span class="pos">已投保</span>':(kids(p).length?'未投保':'暂无孩子')}</td></tr>
      <tr><td>💚 重疾险（本人）</td><td>保费=保额÷(80-年龄) · ${p.insCrit?`<span class="pos">已保${fmt(p.insCrit.sum)}</span>`:(p.illness?'<span class="neg">患过重疾，拒保</span>':'未投保')}</td></tr>
      <tr><td>👶 重疾险（孩子）</td><td>保额50万，年缴约${kids(p).length?fmt(kidCritPrem()):'—'} · ${p.insCritKids?'<span class="pos">已投保</span>':(kids(p).length?'未投保':'暂无孩子')}</td></tr>
      <tr><td>🕊️ 定期寿险</td><td>30-55岁可保，保额100万，年缴${fmt(lifePrem)}（杠杆随年龄递减） · ${p.lifeIns?'<span class="pos">已投保</span>':(p.age>55?'<span class="neg">超龄拒保</span>':'未投保')}</td></tr>
      <tr><td>🔥 房屋财产险</td><td>房产总价0.1%/年 · ${p.insProp?'<span class="pos">已投保</span>':p.props.length?'未投保':'（暂无房产）'}</td></tr>
      <tr><td>💰 分红储蓄险</td><td>4.5%复利，15年锁定 · 现值${fmt(p.saveIns.reduce((s,x)=>s+x.value,0))}</td></tr></table>
      <div class="tip">保费在每年经过银行结算时扣缴。<b>年龄和健康是买保险的门票</b>：${p.age}岁投保重疾100万年缴约 ${fmt(critPrem(100))}；寿险杠杆已从10倍降到${Math.round(lev*10)/10}倍。</div>`;
    const btns=[];
    if(p.insMedSelf) btns.push({label:'退保医疗险', value:'m', cls:'btn-plain btn-sm'});
    else if(!p.illness) btns.push({label:'投保医疗险', value:'m', cls:'btn-gold btn-sm'});
    btns.push({label:(p.insMedParents?'退保父母医疗':'为父母投保'), value:'mp', cls:'btn-plain btn-sm'});
    if(kids(p).length) btns.push({label:(p.insMedKids?'退保孩子医疗':'为孩子投保医疗'), value:'mk', cls:'btn-plain btn-sm'});
    if(!p.insCrit && !p.illness){ btns.push({label:'重疾·保50万', value:'c50', cls:'btn-gold btn-sm'},{label:'重疾·保100万', value:'c100', cls:'btn-gold btn-sm'}); }
    else if(p.insCrit) btns.push({label:'退保重疾险', value:'cx', cls:'btn-plain btn-sm'});
    if(kids(p).length && !p.insCritKids) btns.push({label:'孩子重疾·保50万', value:'ck', cls:'btn-gold btn-sm'});
    else if(p.insCritKids) btns.push({label:'退保孩子重疾', value:'ckx', cls:'btn-plain btn-sm'});
    if(!p.lifeIns && p.age>=30 && p.age<=55) btns.push({label:'定期寿险·保100万', value:'lf', cls:'btn-gold btn-sm'});
    else if(p.lifeIns) btns.push({label:'退保寿险', value:'lfx', cls:'btn-plain btn-sm'});
    if(p.props.length) btns.push({label:(p.insProp?'退保财产险':'投保财产险'), value:'pr', cls:'btn-plain btn-sm'});
    if(p.cash>=10) btns.push({label:'买储蓄险', value:'bs', cls:'btn-gold btn-sm'});
    btns.push({label:'离开', value:'x'});
    const r = await modal({title:'🛡️ 保险公司', klass:'k-teal', html, buttons:btns});
    if(r==='m'){ p.insMedSelf=!p.insMedSelf; log(p, p.insMedSelf?'投保了医疗险。':'退保了医疗险。', false,'🛡️'); }
    else if(r==='mp'){ p.insMedParents=!p.insMedParents; log(p, p.insMedParents?'为父母投保了医疗险。':'退保了父母医疗险。', false,'🛡️'); }

    else if(r==='c50'||r==='c100'){
      const sum=r==='c100'?100:50; const prem=critPrem(sum);
      p.insCrit={sum, premium:prem}; p.flags.boughtCrit=true;
      log(p,`投保重疾险，保额${fmt(sum)}，年缴${fmt(prem)}。`,true,'🛡️');
    }
    else if(r==='cx'){ p.insCrit=null; log(p,'退保了重疾险。',true,'🛡️'); }
    else if(r==='ck'){ const prem=kidCritPrem(); p.insCritKids={sum:50, premium:prem}; p.flags.boughtKidCrit=true; log(p,`为孩子投保重疾险，保额50万，年缴${fmt(prem)}。`,true,'🛡️'); }
    else if(r==='ckx'){ p.insCritKids=null; log(p,'退保了孩子重疾险。','', '🛡️'); }
    else if(r==='lf'){ p.lifeIns={sum:100, premium:lifePrem}; p.flags.boughtLife=true; log(p,`投保定期寿险，保额100万，年缴${fmt(lifePrem)}。`,true,'🕊️'); }
    else if(r==='lfx'){ p.lifeIns=null; log(p,'退保了定期寿险。',true,'🕊️'); }
    else if(r==='pr'){ p.insProp=!p.insProp; log(p, p.insProp?'投保了房屋财产险。':'退保了房屋财产险。', false,'🛡️'); }
    else if(r==='bs'){ await buySaveIns(p); }
    else break;
    renderAll();
  }
}

      ${p.blue?`<tr><td>基金持仓</td><td>${p.blue/100}手 · 成本${fmt(p.blueCost)} · 市值${fmt(bmv)} <span class="${bmv-p.blueCost>=0?'pos':'neg'}">(${bmv-p.blueCost>=0?'+':''}${fmt(bmv-p.blueCost)})</span></td></tr>`:''}
      ${p.gem?`<tr><td>创业板持仓</td><td>${p.gem/100}手 · 成本${fmt(p.gemCost)} · 市值${fmt(gmv)} <span class="${gmv-p.gemCost>=0?'pos':'neg'}">(${gmv-p.gemCost>=0?'+':''}${fmt(gmv-p.gemCost)})</span></td></tr>`:''}

    const act = await modal({title:'📈 证券公司', html:html0, buttons:[
      {label:'买红利基金', value:'bb', cls:'btn-gold btn-sm'},{label:'买创业板', value:'bg', cls:'btn-gold btn-sm'},
      ...(p.blue>0?[{label:'卖红利基金', value:'sb', cls:'btn-plain btn-sm'}]:[]),
      ...(p.gem>0?[{label:'卖创业板', value:'sg', cls:'btn-plain btn-sm'}]:[]),

async function stockTrade(p, act){
  const isFund = act==='bb'||act==='sb', isBuy = act==='bb'||act==='bg';
  const dealPrice = isFund?G.price.fund:G.price.gem;   /* 一律按此刻市价成交 */
  const maxLots = isBuy ? Math.floor(p.cash*10000/(dealPrice*100)) : (isFund?p.blue:p.gem)/100;
  if(maxLots<1){ await info('证券公司', isBuy?'现金不足以买入1手。':'没有持仓可卖。'); return; }
  const defLots = Math.min(10,maxLots);
  const qty = await modal({title:(isBuy?'买入':'卖出')+(isFund?'红利基金':'创业板'), html:
    `<div class="desc">${isBuy?'买入价':'卖出价'} <b>${dealPrice}元/股</b>（此刻市价）。输入手数（1手=100股），最多 ${maxLots} 手：</div>
     <div class="qtyrow"><input type="number" id="qty" min="1" max="${maxLots}" value="${defLots}">
     <button class="btn-plain btn-sm" data-q="100">100手</button>
     <button class="btn-plain btn-sm" data-q="500">500手</button>
     <button class="btn-plain btn-sm" data-q="${maxLots}">全部</button></div>
     <div class="capline" id="capline"></div>`,
    buttons:[{label:'取消',value:null,cls:'btn-plain'},{label:isBuy?'买入':'卖出',pick:kd=>{
      const v=parseInt(kd.querySelector('#qty').value); return (v>=1&&v<=maxLots)?v:null; }}],
    onopen: kd=>{
      const inp=kd.querySelector('#qty'), cap=kd.querySelector('#capline');
      const upd=()=>{
        const v=parseInt(inp.value)||0;
        cap.innerHTML = `${isBuy?'需支付':'可得'}：<b>${fmt(v*dealPrice*100/10000)}</b>（${v}手 × ${dealPrice}元）｜现金 ${fmt(p.cash)}`;
      };
      inp.oninput=upd; upd();
      kd.querySelectorAll('button[data-q]').forEach(b=>b.onclick=()=>{ inp.value=Math.min(+b.dataset.q,maxLots); upd(); });
    }});
  if(!qty) return;
  const amt = Math.round(dealPrice*qty*100)/10000;
  if(isBuy){
    p.cash-=amt;
    if(isFund){ p.blue+=qty*100; p.blueCost+=amt; } else { p.gem+=qty*100; p.gemCost+=amt; }
    log(p,`${dealPrice}元买入${isFund?'红利基金':'创业板'}${qty}手（${fmt(amt)}）。`);
  } else {
    const held = isFund?p.blue:p.gem;
    const costShare = (isFund?p.blueCost:p.gemCost)*(qty*100/held);
    if(isFund){ p.blue-=qty*100; p.blueCost=Math.max(0,p.blueCost-costShare); }
    else { p.gem-=qty*100; p.gemCost=Math.max(0,p.gemCost-costShare); }
    p.cash+=amt;
    log(p,`${dealPrice}元卖出${isFund?'红利基金':'创业板'}${qty}手（${fmt(amt)}）。`);
  }
  p.flags.stockTrades=(p.flags.stockTrades||0)+1;
  renderAll();
}

/* ================= 房产 ================= */
async function propertyOffice(p, cellType){
  /* 住宅格可选：普通住宅 或 学区房 */
  let type = cellType;
  if(cellType==='house'){
    const c = await modal({title:'🏠 住宅投资', klass:'k-green', html:
      `<div class="desc">中介小哥推了推眼镜：「两个盘，您看看？」</div>
       <table class="stmt nw">
       <tr><td>🏠 普通住宅</td><td>${fmt(propPrice('house'))}/套 · 年租金${fmt(PROP_CONF.house.rent)}</td></tr>
       <tr><td>🏫 学区房</td><td>${fmt(propPrice('school'))}/套 · 年租金${fmt(PROP_CONF.school.rent)} · 孩子择校费全免</td></tr></table>
       <div class="tip">学区房价格是普通住宅的2倍，租金却一样——溢价买的不是房子，是一张入学券。</div>`,
      buttons:[{label:'看普通住宅',value:'house',cls:'btn-plain'},{label:'看学区房',value:'school',cls:'btn-gold'},{label:'不看了',value:null,cls:'btn-plain'}]});
    if(!c) return;
    type = c;
  }
  const C = PROP_CONF[type];
  const price = propPrice(type);
  const downNow = Math.max(0, price - C.loan);
  const owned = p.props.filter(x=>x.type===type);
  const html = `<div class="desc">现价 <b>${fmt(price)}</b>/套 · 现金 ${fmt(p.cash)} · 已持有${C.nm} ${owned.length} 套</div>
    <table class="stmt nw">
    <tr><td>首付</td><td>${fmt(downNow)}（贷款 ${fmt(C.loan)}，${C.term}年按揭）</td></tr>
    <tr><td>年还本付息</td><td>${fmt(C.pay*G.rateF)}（随利率浮动）</td></tr>
    <tr><td>年租金</td><td class="pos">${fmt(C.rent)}</td></tr>
    ${type==='shop'?'<tr><td>卖出税费</td><td>盈利部分的50%</td></tr>':''}</table>
    <div class="tip">${type==='shop'?'商铺租金回报更高，但流动性差、税费高——「一铺养三代」的另一面是「一铺套三代」。':type==='school'?'持有学区房期间，孩子的择校费自动免除。但请想清楚：政策一变，溢价就可能蒸发。':'住宅的租金回报低，赚的是「涨价+杠杆」的钱，但利率和房价的波动也会被杠杆放大。'}</div>`;
  const btns=[];
  if(p.cash>=downNow) btns.push({label:`买入一套（首付${fmt(downNow)}）`, value:'buy', cls:'btn-gold'});
  else btns.push({label:`💱 现金不够首付？凑一笔（差${fmt(downNow-p.cash)}）`, value:'raise', cls:'btn-gold'});
  if(owned.length) btns.push({label:'卖出一套', value:'sell', cls:'btn-plain'});
  btns.push({label:'离开', value:'x', cls:'btn-plain'});
  const r = await modal({title:`${type==='shop'?'🏬':type==='school'?'🏫':'🏠'} ${C.nm}投资`, klass:'k-green', html, buttons:btns});
  if(r==='raise'){
    const ok = await raiseFunds(p, downNow, `${C.nm}首付`);
    if(ok) return propertyOffice(p, type==='shop'?'shop':'house');
    return;
  }
  if(r==='buy'){
    p.cash-=downNow;
    p.props.push({type, buyPrice:price, loan:C.loan, pay:C.pay, rent:C.rent});
    log(p,`买入一套${C.nm}（价${fmt(price)}，首付${fmt(downNow)}，贷款${fmt(C.loan)}）。`,true,type==='shop'?'🏬':type==='school'?'🏫':'🏠');
    p.flags.boughtProp=true; if(type==='school') p.flags.schoolHouse=true;
    if(!p.insProp){
      const q = await modal({title:'顺便投保财产险？', klass:'k-teal', html:`<div class="desc">房屋财产险：年保费仅为房产总价的0.1%，火灾等灾害可全额理赔。</div>`,
        buttons:[{label:'不用了', value:false, cls:'btn-plain'},{label:'投保', value:true, cls:'btn-gold'}]});
      if(q){ p.insProp=true; log(p,'为房产投保了财产险。','', '🛡️'); }
    }
  } else if(r==='sell'){
    const i = p.props.findIndex(x=>x.type===type);
    const pr = p.props[i]; const v = price;
    let tax = 0;
    if(type==='shop') tax = Math.max(0,(v-pr.buyPrice))*0.5;
    const net = v - pr.loan - tax;
    const ok = await modal({title:'卖出确认', html:`<div class="desc">市价 ${fmt(v)} − 剩余贷款 ${fmt(pr.loan)}${tax?` − 税费 ${fmt(tax)}`:''} = 净回 <b class="pos">${fmt(net)}</b></div>`,
      buttons:[{label:'再想想',value:false,cls:'btn-plain'},{label:'成交',value:true}]});
    if(ok){ p.props.splice(i,1); p.cash+=net; log(p,`卖出${C.nm}，净回 ${fmt(net)}。`,true,'🏠'); }
  }
  renderAll();
}
